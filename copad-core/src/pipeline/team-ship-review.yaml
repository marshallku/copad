name: ship-review
description: "Plan → implement → review pipeline. Ships a small slice end-to-end with a review pass before commit."
roles:
  - planner
  - implementer
  - reviewer
stages:
  - name: plan
    parallel: false
    roles:
      - role: planner
    output: stages/01-plan.md
  - name: implement
    parallel: false
    roles:
      - role: implementer
    output: stages/02-implementation.md
  - name: review
    parallel: false
    roles:
      - role: reviewer
    output: stages/03-review.md
