name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libvte-2.91-gtk4-dev libwebkitgtk-6.0-dev libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

      - name: Bundle tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="copad-v${VERSION}-x86_64-linux.tar.gz"
          mkdir -p dist
          cp target/release/copad dist/
          cp target/release/coctl dist/
          cp target/release/copad-mux dist/
          # Desktop file basename matches the GTK app_id so Wayland
          # compositors map running windows to this launcher entry.
          cp copad-linux/com.marshall.copad.desktop dist/
          # Carry the hicolor icon set so install.sh can lay it out
          # under share/icons/hicolor/<size>/apps/. The shape mirrors
          # the in-repo copad-linux/icons/ tree exactly.
          cp -r copad-linux/icons dist/icons
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    # macos-15 = arm64 + Xcode 16. copad-macos/Package.swift declares
    # swift-tools-version 6.0 (so macos-14's Swift 5.10 errors at manifest
    # parse), and the Swift sources use trailing commas in parameter lists
    # (SE-0439, Swift 6.1+) — so the default Xcode on macos-15 (Swift 6.0)
    # ALSO fails. The setup-xcode action below picks the newest stable
    # Xcode installed on the runner image, which is currently 16.3+ /
    # Swift 6.1+. Keep this even if the runner image upgrades — it makes
    # the toolchain selection explicit instead of relying on whichever
    # Xcode happens to be at /Applications/Xcode.app.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # copad-linux depends on GTK4/VTE so `cargo build --workspace` fails
      # on Darwin. List the macOS-buildable crates explicitly. Keep the
      # plugin set in sync with install-macos.sh's MACOS_PLUGINS array.
      - name: Build Rust crates (workspace minus copad-linux)
        run: |
          cargo build --release \
            -p copad-ffi \
            -p copad-term \
            -p copad-cli \
            -p copad-mux \
            -p copad-daemon \
            -p copad-plugin-echo \
            -p copad-plugin-git \
            -p copad-plugin-llm \
            -p copad-plugin-calendar \
            -p copad-plugin-kb \
            -p copad-plugin-todo \
            -p copad-plugin-bookmark \
            -p copad-plugin-slack \
            -p copad-plugin-discord \
            -p copad-plugin-jira

      - name: Build Swift app
        working-directory: copad-macos
        run: swift build -c release

      - name: Stage Copad.app + ad-hoc codesign + assemble tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="copad-v${VERSION}-aarch64-apple-darwin.tar.gz"

          REPO_ROOT="$(pwd)"
          DIST="$REPO_ROOT/dist-macos"
          rm -rf "$DIST"
          mkdir -p "$DIST"

          # ---- Copad.app bundle ----
          STAGING="$DIST/Copad.app"
          MACOS_DIR="$STAGING/Contents/MacOS"
          RESOURCES="$STAGING/Contents/Resources"
          mkdir -p "$MACOS_DIR" "$RESOURCES"
          cp copad-macos/.build/release/Copad "$MACOS_DIR/Copad"
          if [[ -f copad-macos/Resources/AppIcon.icns ]]; then
            cp copad-macos/Resources/AppIcon.icns "$RESOURCES/AppIcon.icns"
          fi

          # Info.plist gets the release tag's version baked into both
          # CFBundleVersion and CFBundleShortVersionString. LSMinimumSystemVersion
          # mirrors install-macos.sh.
          cat > "$STAGING/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Copad</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.marshall.copad</string>
              <key>CFBundleName</key>
              <string>copad</string>
              <key>CFBundleDisplayName</key>
              <string>copad</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

          # Ad-hoc sign for distribution. scripts/codesign-dev.sh uses a
          # login-keychain self-signed cert to keep TCC grants stable across
          # local rebuilds; that's a dev-loop concern, not a distribution
          # one. Cask removes quarantine on install, so an ad-hoc signature
          # is enough for Gatekeeper to let the app launch.
          codesign --force --deep --sign - --timestamp=none "$STAGING"
          codesign -dv "$STAGING" 2>&1 | head -5 || true

          # ---- Top-level CLI binaries ----
          cp target/release/coctl "$DIST/coctl"
          cp target/release/copadd "$DIST/copadd"
          cp target/release/copad-mux "$DIST/copad-mux"

          # ---- Plugins (binary + plugin.toml + panel.html / triggers.example.toml) ----
          # Layout matches what install-macos.sh writes into
          # ~/Library/Application Support/copad/plugins/<name>/. PluginSupervisor
          # resolves `services.exec` against the plugin dir first, so the
          # binary co-located with the manifest wins over $PATH lookup.
          mkdir -p "$DIST/plugins"
          for name in echo git llm calendar kb todo bookmark slack discord jira; do
            crate="copad-plugin-$name"
            src_dir="plugins/$name"
            bin_src="target/release/$crate"
            plugin_dir="$DIST/plugins/$name"
            mkdir -p "$plugin_dir"
            find "$src_dir" -maxdepth 1 -type f ! -name 'Cargo.toml' \
              -exec cp -f {} "$plugin_dir/" \;
            cp -f "$bin_src" "$plugin_dir/$crate"
            chmod 755 "$plugin_dir/$crate"
          done

          # ---- Shell hooks (live-cwd tracking for session restore) ----
          mkdir -p "$DIST/shell-hooks"
          cp copad-macos/shell-hooks/copad-cwd.* "$DIST/shell-hooks/"

          # ---- LaunchAgent plist (HOME_PLACEHOLDER unexpanded; downstream
          #      consumers — install-macos.sh and the brew cask postflight —
          #      substitute their own path, since launchd does not expand `~`) ----
          cp dist/launchd/com.marshall.copad.daemon.plist "$DIST/com.marshall.copad.daemon.plist"

          # ---- Pack ----
          # Strip the dist-macos/ prefix so consumers see Copad.app / coctl / …
          # at the tarball root.
          tar -czf "$ARCHIVE" -C "$DIST" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/linux-x86_64/*.tar.gz
            artifacts/macos-aarch64/*.tar.gz
          generate_release_notes: false
