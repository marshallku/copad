# Presence detection via hypridle (Hyprland).
#
# Paste these listener blocks into your existing
# `~/.config/hypr/hypridle.conf` — they coexist with the DPMS-off /
# lock-session listeners hypridle ships with. No new daemon, no
# systemd unit; hypridle already runs as part of the Hyprland session.
#
# Threshold knob: `timeout = 300` (5 minutes). Tune to taste.
#
# Caveat — PATH. hypridle is typically started by Hyprland's
# exec-once before your shell init runs, so $PATH may not include
# ~/.local/bin. If `coctl` is at ~/.local/bin/coctl, either use
# the absolute path here or `exec-once = systemctl --user
# import-environment PATH` in hyprland.conf so hypridle inherits it.

# Idle-driven away/active toggle.
listener {
  timeout    = 300
  on-timeout = coctl presence away
  on-resume  = coctl presence active
}

# Optional — lock as a hard "away" signal. hypridle's listener
# schema doesn't have an `on-lock` key, so this is wired the other
# way: extend the `general.lock_cmd` you already use for hyprlock so
# entering the lock screen also flips presence. Drop this into your
# existing `general { … }` block in place of the current lock_cmd:
#
#   lock_cmd = coctl presence away ; pidof hyprlock || hyprlock
#
# Resume gets handled by the idle listener's `on-resume` above when
# you unlock and start moving the mouse / typing.
