[plugin]
name = "pilot"
title = "Pilot — Autonomous Goal Queue"
version = "0.1.0"
description = "Owns a persistent goal queue and drives one interactive agent session at a time via csd."

[[services]]
name = "main"
exec = "copad-plugin-pilot"
activation = "onStartup"
restart = "on-crash"
provides = ["pilot.add", "pilot.list", "pilot.status", "pilot.cancel", "pilot.answer", "pilot.approve"]
subscribes = []

# In-copad cockpit (Phase 24.6 follow-up): the same pilot.* actions the
# web-bridge cockpit drives, rendered as a GTK WebView panel via the
# copad.call() bridge — so the queue is reachable without a browser.
# `coctl plugin open pilot` (or the panel launcher).
[[panels]]
name = "main"
title = "Pilot"
file = "panel.html"
icon = "applications-engineering-symbolic"
