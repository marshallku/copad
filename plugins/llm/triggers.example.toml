# Example triggers using the LLM plugin.
#
# llm.complete params:
#   { prompt: required, system?, model?, max_tokens?, temperature?, source? }
#   `source` is a free-form label written to the usage log so
#   `llm.usage by_model=...` reports can be sliced by caller.
#
# llm.complete result shape:
#   { text, model, stop_reason, usage: { input_tokens, output_tokens } }
#
# Token-only cost surfacing — the plugin doesn't carry pricing
# tables. Compute cost in your own dashboard / report layer using
# `llm.usage` output and your current per-model rates.

# ---------------------------------------------------------------------
# Result handling (Phase 14.2 chains)
# ---------------------------------------------------------------------
# A trigger-fired `llm.complete` publishes `llm.complete.completed`
# with the result payload when it finishes (registry-level fan-out).
# To USE the result, give the firing trigger an `[triggers.await]`
# clause: the engine then synthesizes `<trigger_name>.awaited` whose
# payload carries the ORIGINAL event's fields at the top level plus
# the awaited result under `await:` — a second trigger consumes that
# and reads `{event.await.text}`.
#
# Correlation caveat (14.2 slice-1 limit): in-flight awaits on the
# same action correlate FIFO per action name. Two `llm.complete`
# calls completing out of dispatch order can mis-pair. Fine for
# human-rate flows (DMs, reactions); for high-rate order-sensitive
# chains, give each trigger its own wrapper action.
#
# For ad-hoc summarization with visible output, use coctl:
#   coctl call llm.complete --params '{"prompt":"summarize this thread: ..."}'
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# 1. Daily usage report (manual via coctl)
#    coctl call llm.usage --params '{"since":"2026-04-27T00:00:00Z"}'
#    → {calls, input_tokens, output_tokens, by_model: {...},
#       parse_errors, since, until}
#
#    Slice by model:
#    coctl call llm.usage --params '{"by_model":"claude-sonnet-4-6"}'
#
#    Slice by trigger source: aggregator doesn't filter by `source`
#    in v1 (just `model` + time). Use the JSONL file directly:
#    jq -s 'group_by(.source) | map({source: .[0].source, calls: length})' \
#       ~/.local/share/copad/llm-usage-default.jsonl
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# 2. Auto-summarize Slack DMs into a derived KB note (Phase 14.3)
#    The real chain the old "fire-and-forget" limitation note used to
#    rule out: summarize each DM, append the summary to a per-sender
#    derived markdown file under the KB.
#
#    💸 COST: one LLM call per DM received. This file is NOT loaded
#    at runtime — copying these two blocks into config.toml is the
#    opt-in. Narrow with a `condition` (e.g. on `event.user`) if you
#    only want specific senders summarized.
# ---------------------------------------------------------------------
[[triggers]]
name = "slack-dm-summarize"
action = "llm.complete"
params = { system = "You summarize Slack messages into 1-3 terse bullet points. Output only the bullets.", prompt = "{event.text}", max_tokens = 300, source = "trigger:slack-dm-summarize" }
[triggers.when]
event_kind = "slack.dm"
[triggers.await]
event_kind = "llm.complete.completed"
timeout_seconds = 120
on_timeout = "abort"

[[triggers]]
name = "slack-dm-summarize-save"
action = "kb.append"
params = { id = "threads/derived/slack-dm-{event.user}.md", content = """

## {event.ts}

{event.await.text}

""", ensure = true }
[triggers.when]
event_kind = "slack-dm-summarize.awaited"

