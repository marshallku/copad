# Example triggers driven by the Google Calendar plugin.
#
# Drop relevant pieces of this file into your copad config (or include
# a `[[triggers]]` block in `~/.config/copad/config.toml`) once the
# calendar plugin is authenticated.
#
# The plugin emits ONE event kind: `calendar.event_imminent` — payload
# fields shown in the inline comments below. From there it's all
# trigger config: which action to run, what to pass it, when to skip.
#
# Calendar plugin is purely an event emitter — it does NOT itself
# create KB notes, post Slack messages, or open panels. Those are
# trigger destinations and you compose them however you want.
#
# ---------------------------------------------------------------------
# Trigger language quick reference (Phase 10.2)
# ---------------------------------------------------------------------
# `[triggers.when]`     — required positive match: `event_kind` glob
#                          plus key=value payload equality.
# `condition = "..."`   — optional boolean expression evaluated AFTER
#                          `when` matches. Lets you negate, combine,
#                          and reference any payload/context field.
#                          Operators: == != < <= > >= && || !
#                          References: event.X.Y / context.X
#                          Literals: "string", numbers, true/false/null
#                          Ordering ops require numeric operands;
#                          mismatched types skip the trigger safely.
#                          A bad parse drops just THAT trigger with a
#                          log warning — others still load.
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# 1. Common pre-meeting prep: ensure a per-event meeting note in KB.
#    Skips events you declined AND skips the weekly 1:1 (handled by
#    rule 2). With Phase 10.2 these exclusions are written directly
#    in the `condition` field — no longer requires multi-rule
#    workarounds.
# ---------------------------------------------------------------------
[[triggers]]
name = "meeting-prep-common"
action = "kb.ensure"
params = { id = "meetings/{event.id}.md", default_template = """\
---
title: {event.title}
date: {event.start_time}
attendees:
location: {event.location}
---

# {event.title}

""" }
condition = """
event.my_response_status != "declined" \
&& event.recurring_id != "REPLACE_WITH_YOUR_WEEKLY_1ON1_RECURRING_ID"
"""

[triggers.when]
event_kind = "calendar.event_imminent"
# 10-min lead only — not the 60-min one (if you also configure 60m).
lead_minutes = 10

# ---------------------------------------------------------------------
# 2. Per-recurring-event override: weekly 1:1 appends to a rolling
#    note instead of getting its own file. Independent of rule 1
#    (rule 1 excludes this recurring_id; rule 2 only matches it).
# ---------------------------------------------------------------------
[[triggers]]
name = "weekly-1on1-rolling-note"
action = "kb.append"
# `content` is the documented kb.append param name (see docs/kb-protocol.md).
params = { id = "meetings/1on1-rolling.md", content = """

## {event.start_time}

""", ensure = true }
# Same skip-when-declined guard as the common rule.
condition = """event.my_response_status != "declined""""

[triggers.when]
event_kind = "calendar.event_imminent"
recurring_id = "REPLACE_WITH_YOUR_WEEKLY_1ON1_RECURRING_ID"
lead_minutes = 10

# ---------------------------------------------------------------------
# 3. 60-min "block focus time" reminder via system notification
#    (assuming a notify plugin exposes notify.send — illustrative).
# ---------------------------------------------------------------------
# [[triggers]]
# name = "block-focus-before-meeting"
# action = "notify.send"
# params = { title = "Meeting in 60 min", body = "{event.title} at {event.start_time}" }
# [triggers.when]
# event_kind = "calendar.event_imminent"
# lead_minutes = 60

# ---------------------------------------------------------------------
# 4. Open the calendar UI on demand — trigger via coctl, not a
#    calendar event. Run:
#
#      coctl call webview.open --params '{"url":"https://calendar.google.com","mode":"tab"}'
#
#    Or bind it to a shortcut by wrapping in a [[triggers]] entry that
#    listens for whatever event your shortcut publishes (e.g.
#    `keybind.calendar_open`).
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# 5. Auto-open the meeting's video link 1 minute before start
#    (illustrative — uncomment when you have a 1m lead configured
#    and you actually want this).
# ---------------------------------------------------------------------
# [[triggers]]
# name = "open-meet-link"
# action = "webview.open"
# params = { url = "{event.conference_url}", mode = "tab" }
# [triggers.when]
# event_kind = "calendar.event_imminent"
# lead_minutes = 1

# ---------------------------------------------------------------------
# 6. Meeting-prep auto-open (Phase 14.3 — deferred since Phase 10).
#    The chained version of rule 1: ensure the per-event note, then
#    open THAT note in a webview tab once `kb.ensure` reports its
#    absolute path. The await scopes the open to this trigger's
#    kb.ensure call; `{event.await.path}` is kb.ensure's `path`
#    result field (see docs/kb-protocol.md).
#
#    Pairs with rule 1 but is standalone — rule 1 only creates the
#    note; this pair creates AND opens. Same exclusions as rule 1
#    (skip declined, skip the weekly 1:1 that rule 2 routes to its
#    rolling note). If you enable both rule 1 and this chain, the
#    duplicate kb.ensure is harmless (create-only, exactly-one-creator)
#    but you probably want just one of the two.
# ---------------------------------------------------------------------
[[triggers]]
name = "meeting-prep-open-note"
action = "kb.ensure"
params = { id = "meetings/{event.id}.md", default_template = """\
---
title: {event.title}
date: {event.start_time}
location: {event.location}
---

# {event.title}

""" }
condition = """
event.my_response_status != "declined" \
&& event.recurring_id != "REPLACE_WITH_YOUR_WEEKLY_1ON1_RECURRING_ID"
"""

[triggers.when]
event_kind = "calendar.event_imminent"
lead_minutes = 10

[triggers.await]
event_kind = "kb.ensure.completed"
timeout_seconds = 15
on_timeout = "abort"

[[triggers]]
name = "meeting-prep-open-note-show"
action = "webview.open"
params = { url = "file://{event.await.path}", mode = "tab" }

[triggers.when]
event_kind = "meeting-prep-open-note.awaited"
