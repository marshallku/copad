[plugin]
name = "slack"
title = "Slack"
version = "0.2.0"
description = "Slack Socket Mode plugin: emits slack.mention / slack.dm / slack.reaction / slack.raw events; provides slack.post_message + slack.get_message for replies and reaction-driven body fetch."

[[services]]
name = "main"
exec = "copad-plugin-slack"
# onStartup: Socket Mode requires a long-lived WebSocket connection
# that needs to be alive whenever copad is, so events flow inbound at
# arrival time. Lazy (onAction) activation works for slack.post_message
# alone but would lose mention/DM/reaction events between copad starts
# and the first action call — which defeats the point.
activation = "onStartup"
restart = "on-crash"
provides = [
    "slack.auth_status",
    "slack.post_message",
    "slack.get_message",
    "slack.channels.list",
    "slack.channels.upsert",
    "slack.channels.remove",
    "slack.channels.discover",
    "slack.bot_rpc.invoke",
]
subscribes = []
# Required env: COPAD_SLACK_BOT_TOKEN (xoxb-...), COPAD_SLACK_APP_TOKEN (xapp-...)
# Optional env: COPAD_SLACK_WORKSPACE (default "default" — keyring entry namespace),
#               COPAD_SLACK_REQUIRE_SECURE_STORE (default false — refuse plaintext fallback)
#
# One-time setup:
#   1. Create a Slack App at https://api.slack.com/apps
#   2. Enable Socket Mode (Settings → Socket Mode); generate an
#      App-Level Token with `connections:write` scope (xapp-...)
#   3. Subscribe to bot events (Event Subscriptions):
#        app_mention, message.im, reaction_added
#      ← `reaction_added` REQUIRED for slack.reaction events.
#   4. Add OAuth scopes (OAuth & Permissions, Bot Token Scopes):
#        app_mentions:read, im:history, users:read,
#        chat:write          ← required for slack.post_message
#        reactions:read      ← required for slack.reaction events
#        channels:history    ← required for slack.get_message in
#                              public channels (use groups:history /
#                              im:history / mpim:history for the
#                              respective conversation kinds)
#        channels:read       ← required for slack.channels.discover
#                              (public channels listing). Add groups:read
#                              if you want private channels in discover.
#   5. Install to your workspace; copy the Bot User OAuth Token (xoxb-...)
#   6. Run `COPAD_SLACK_BOT_TOKEN=xoxb-... COPAD_SLACK_APP_TOKEN=xapp-... copad-plugin-slack auth`

# Panel name "main" so `coctl plugin open slack` works without
# having to pass `--params '{"panel":"..."}'` — the dispatch path
# defaults to panel="main" when none is supplied.
[[panels]]
name = "main"
title = "Slack"
file = "panel.html"
