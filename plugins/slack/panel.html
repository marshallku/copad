<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Slack</title>
<style>
/* ========================================================================
   slack/panel.html — single panel with two internal views
   Top-level tab strip switches between FEED (Signal Log: mention/DM/reaction
   event feed) and CHANNELS (per-channel profile registry). Monospace
   throughout, Catppuccin Mocha tokens, type-rail color is the primary
   visual differentiator.
   ----------------------------------------------------------------------
   §1   TOKENS         design tokens, status colors, motion timings
   §2   RESET          box-sizing, color-scheme, body baseline
   §3   LAYOUT         shell: header / tabs / body / composer
   §4   HEADER         workspace + status pill + refresh
   §5   TABS           internal view switcher (feed | channels)
   §6   FILTER         feed sub-filter (chip row, active state)
   §7   FEED           event-card list, empty state
   §8   CARD           shared card chrome — rail / collapsed / expanded
   §8.1 CARD-MENTION   mention rail
   §8.2 CARD-DM        DM rail
   §8.3 CARD-RXN       reaction rail + reacted-on body slot
   §9   CHANNELS       channel-registry view (add bar + row list + edit form)
   §9.1 CHAN-ROW       channel row chrome — rail per profile
   §9.2 CHAN-FORM      inline edit form (name / profile / bot-rpc)
   §9.3 CHAN-BOTRPC    bot-rpc sub-form (template / wait / regex / timeout)
   §10  COMPOSER       sticky standalone + inline reply (feed only)
   §11  TOAST          error / success overlay
   §12  SETUP          fatal/setup view (replaces feed+channels when un-auth)
   §13  MOTION         keyframes, prefers-reduced-motion override
   §14  UTIL           visually-hidden, truncate, copy-btn
   ======================================================================== */

/* §1 TOKENS ------------------------------------------------------------- */
:root {
  --slack-ok:    #a6e3a1;
  --slack-warn:  #f9e2af;
  --slack-info:  #89b4fa;
  --slack-rxn:   #94e2d5;

  /* Type rails — modifier-driven; defaults to overlay grey */
  --rail-default: var(--copad-overlay0);
  --rail-mention: var(--copad-accent);
  --rail-dm:      var(--slack-info);
  --rail-rxn:     var(--slack-rxn);

  /* Channel-profile rails */
  --rail-read:    var(--copad-overlay0);
  --rail-collect: var(--slack-ok);
  --rail-bot:     var(--slack-info);

  --t-fast: 80ms cubic-bezier(.2, 0, .1, 1);
  --t-med:  180ms cubic-bezier(.2, 0, .1, 1);
  --t-slow: 320ms cubic-bezier(.2, 0, .1, 1);

  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px; --s-7: 32px;

  --fs-meta: 11px;
  --fs-body: 12px;
  --fs-id:   13px;
  --fs-head: 15px;

  --row-h-collapsed: 30px;
  --rail-w:          4px;
}

/* §2 RESET -------------------------------------------------------------- */
*, *::before, *::after { box-sizing: border-box; }
:root { color-scheme: dark; }

html, body { height: 100%; }
body {
  margin: 0;
  font-family: "Iosevka Term", "Iosevka", "JetBrains Mono", "Cascadia Mono",
               "SFMono-Regular", "Liberation Mono", ui-monospace, monospace;
  font-feature-settings: "tnum", "ss02", "calt";
  font-size: var(--fs-body);
  line-height: 1.45;
  color: var(--copad-text);
  background: transparent;
}

/* §3 LAYOUT ------------------------------------------------------------- */
.slack-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-height: 0;
}

/* §4 HEADER ------------------------------------------------------------- */
.slack-header {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  height: 36px;
  padding-inline: var(--s-4);
  background: color-mix(in oklab, var(--copad-surface0) 60%, transparent);
  border-bottom: 1px solid var(--copad-overlay0);
  flex-shrink: 0;
}
.slack-header__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--copad-overlay0);
  flex-shrink: 0;
}
.slack-header__dot--ok   { background: var(--slack-ok); animation: signalPulse 2.4s ease-out infinite; }
.slack-header__dot--warn { background: var(--slack-warn); }
.slack-header__dot--err  { background: var(--copad-red); }
.slack-header__workspace {
  font-size: var(--fs-head);
  font-weight: 500;
  color: var(--copad-text);
  letter-spacing: -0.005em;
}
.slack-header__meta {
  display: flex; gap: var(--s-3);
  font-size: var(--fs-meta);
  color: var(--copad-subtext0);
  font-style: italic;
}
.slack-header__meta strong {
  font-weight: 400; font-style: normal;
  color: var(--copad-subtext1);
}
.slack-header__spacer { flex: 1; }
.slack-header__refresh {
  background: transparent;
  border: 1px solid var(--copad-surface2);
  color: var(--copad-subtext1);
  font: inherit;
  font-size: var(--fs-meta);
  padding: 4px 10px;
  height: 24px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
}
.slack-header__refresh:hover {
  background: var(--copad-surface1);
  color: var(--copad-text);
}
.slack-header__refresh:active { transform: scale(0.97); }
.slack-header__refresh:disabled { opacity: 0.4; cursor: progress; }

/* §5 TABS --------------------------------------------------------------- */
.slack-tabs {
  display: flex;
  align-items: stretch;
  height: 28px;
  padding-inline: var(--s-4);
  border-bottom: 1px solid var(--copad-overlay0);
  flex-shrink: 0;
  background: color-mix(in oklab, var(--copad-surface0) 30%, transparent);
}
.slack-tabs__tab {
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  color: var(--copad-subtext0);
  font: inherit;
  font-size: var(--fs-meta);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 var(--s-3);
  cursor: pointer;
  transition: color var(--t-fast), border-color var(--t-fast);
  margin-bottom: -1px;
}
.slack-tabs__tab:hover { color: var(--copad-text); }
.slack-tabs__tab--active {
  color: var(--copad-accent);
  border-bottom-color: var(--copad-accent);
}
.slack-tabs__count {
  margin-left: 4px;
  color: var(--copad-subtext0);
  font-variant-numeric: tabular-nums;
}
.slack-tabs__tab--active .slack-tabs__count {
  color: color-mix(in oklab, var(--copad-accent) 70%, var(--copad-subtext1));
}

/* §6 FILTER ------------------------------------------------------------- */
.slack-filter {
  display: flex;
  gap: var(--s-1);
  align-items: center;
  height: 32px;
  padding-inline: var(--s-4);
  border-bottom: 1px solid var(--copad-overlay0);
  flex-shrink: 0;
}
.slack-filter__chip {
  background: transparent;
  border: 0;
  color: var(--copad-subtext0);
  font: inherit;
  font-size: var(--fs-meta);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
}
.slack-filter__chip:hover {
  background: color-mix(in oklab, var(--copad-surface0) 40%, transparent);
}
.slack-filter__chip--active { color: var(--copad-accent); }
.slack-filter__count {
  margin-left: 4px;
  color: var(--copad-subtext0);
  font-variant-numeric: tabular-nums;
}
.slack-filter__chip--active .slack-filter__count {
  color: color-mix(in oklab, var(--copad-accent) 70%, var(--copad-subtext1));
}

/* §7 FEED --------------------------------------------------------------- */
.slack-feed {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: var(--s-4) var(--s-4) var(--s-7);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.slack-feed::-webkit-scrollbar { width: 8px; }
.slack-feed::-webkit-scrollbar-track { background: transparent; }
.slack-feed::-webkit-scrollbar-thumb {
  background: var(--copad-surface1);
  border-radius: 4px;
}
.slack-feed::-webkit-scrollbar-thumb:hover { background: var(--copad-surface2); }

.slack-feed__empty {
  margin: var(--s-7) auto;
  color: var(--copad-subtext0);
  font-style: italic;
  font-size: var(--fs-body);
  text-align: center;
}
.slack-feed__empty::before {
  content: "··· ";
  letter-spacing: 0.2em;
  color: var(--copad-overlay0);
}
.slack-feed__empty::after {
  content: " ···";
  letter-spacing: 0.2em;
  color: var(--copad-overlay0);
}

/* §8 CARD --------------------------------------------------------------- */
.slack-card {
  --rail-color: var(--rail-default);
  display: grid;
  grid-template-columns: 56px 1fr auto;
  grid-template-areas:
    "rail body actions"
    "rail expand expand";
  align-items: start;
  gap: 0 var(--s-3);
  padding: var(--s-2) var(--s-3) var(--s-2) var(--s-2);
  background: color-mix(in oklab, var(--copad-surface0) 60%, transparent);
  border-left: var(--rail-w) solid var(--rail-color);
  border-left-color: color-mix(in oklab, var(--rail-color) 40%, transparent);
  border-radius: 0 4px 4px 0;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast),
              transform var(--t-fast), padding var(--t-med);
}
.slack-card:hover {
  background: color-mix(in oklab, var(--copad-surface1) 85%, transparent);
  border-left-color: var(--rail-color);
  transform: translateY(-1px);
}
.slack-card:active { transform: translateY(0) scale(0.997); }
.slack-card:focus-visible {
  outline: 1px solid var(--copad-accent);
  outline-offset: 2px;
}
.slack-card--expanded {
  background: var(--copad-surface1);
  border-left-color: var(--rail-color);
  padding-block: var(--s-3) var(--s-4);
  cursor: default;
}
.slack-card--expanded:hover { transform: none; }

.slack-card__rail {
  grid-area: rail;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding-top: 2px;
}
.slack-card__badge {
  font-size: var(--fs-meta);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: color-mix(in oklab, var(--rail-color) 80%, var(--copad-text));
  font-weight: 600;
}
.slack-card__ts {
  font-size: var(--fs-meta);
  color: var(--copad-subtext0);
  font-variant-numeric: tabular-nums;
  font-style: italic;
  white-space: nowrap;
}

.slack-card__body {
  grid-area: body;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.slack-card__head {
  display: flex;
  gap: var(--s-2);
  align-items: baseline;
  flex-wrap: wrap;
  font-size: var(--fs-id);
}
.slack-card__channel { color: var(--copad-text); font-weight: 600; }
.slack-card__user    { color: var(--copad-subtext1); font-weight: 400; }
.slack-card__rel {
  color: var(--copad-subtext0);
  font-style: italic;
  font-size: var(--fs-meta);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.slack-card__preview {
  color: var(--copad-subtext1);
  font-size: var(--fs-body);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.slack-card--expanded .slack-card__preview {
  white-space: pre-wrap;
  overflow: visible;
  color: var(--copad-text);
  word-break: break-word;
}

.slack-card__actions {
  grid-area: actions;
  display: flex;
  gap: var(--s-1);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-med);
  align-self: center;
}
.slack-card:hover .slack-card__actions,
.slack-card:focus-within .slack-card__actions,
.slack-card--expanded .slack-card__actions {
  opacity: 1;
  pointer-events: auto;
}
.slack-card__action {
  background: transparent;
  border: 0;
  color: var(--copad-subtext0);
  font: inherit;
  font-size: var(--fs-meta);
  letter-spacing: 0.04em;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
}
.slack-card__action:hover {
  background: var(--copad-surface2);
  color: var(--copad-text);
}

.slack-card__expand {
  grid-area: expand;
  margin-top: var(--s-3);
  display: none;
  flex-direction: column;
  gap: var(--s-3);
}
.slack-card--expanded .slack-card__expand { display: flex; }

.slack-card__sent {
  font-size: var(--fs-meta);
  color: var(--slack-ok);
  font-style: italic;
  font-variant-numeric: tabular-nums;
}

/* §8.1 CARD-MENTION ----------------------------------------------------- */
.slack-card--mention { --rail-color: var(--rail-mention); }

/* §8.2 CARD-DM ---------------------------------------------------------- */
.slack-card--dm { --rail-color: var(--rail-dm); }

/* §8.3 CARD-RXN --------------------------------------------------------- */
.slack-card--rxn { --rail-color: var(--rail-rxn); }
.slack-card--rxn .slack-card__badge {
  font-size: 13px;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 500;
}
.slack-card--rxn .slack-card__preview::before {
  content: "↳ on: ";
  color: var(--copad-overlay0);
}
.slack-card__rxn-body {
  font-size: var(--fs-body);
  color: var(--copad-subtext1);
  background: color-mix(in oklab, var(--copad-surface0) 80%, transparent);
  border-left: 2px solid var(--copad-overlay0);
  padding: var(--s-2) var(--s-3);
  white-space: pre-wrap;
  word-break: break-word;
  font-style: italic;
}
.slack-card__rxn-body--loading {
  color: var(--copad-subtext0);
  font-style: italic;
}

/* §9 CHANNELS ----------------------------------------------------------- */
.chan-add {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  padding: var(--s-2) var(--s-4);
  background: color-mix(in oklab, var(--copad-surface0) 40%, transparent);
  border-bottom: 1px solid var(--copad-overlay0);
  flex-shrink: 0;
}
.chan-add::before {
  content: "+";
  color: var(--copad-subtext0);
  font-size: var(--fs-head);
  flex-shrink: 0;
}
.chan-add__input {
  flex: 1;
  background: var(--copad-surface0);
  border: 1px solid var(--copad-surface2);
  color: var(--copad-text);
  font: inherit;
  font-size: var(--fs-body);
  padding: 4px 8px;
  height: 24px;
  border-radius: 3px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.chan-add__input:focus {
  outline: 1px solid var(--copad-accent);
  outline-offset: 1px;
  border-color: var(--copad-accent);
}
.chan-add__select {
  background: var(--copad-surface0);
  border: 1px solid var(--copad-surface2);
  color: var(--copad-text);
  font: inherit;
  font-size: var(--fs-body);
  padding: 4px 8px;
  height: 24px;
  border-radius: 3px;
  cursor: pointer;
}
.chan-add__select:focus {
  outline: 1px solid var(--copad-accent);
  outline-offset: 1px;
  border-color: var(--copad-accent);
}
.chan-add__submit {
  background: transparent;
  border: 1px solid var(--copad-surface2);
  color: var(--copad-subtext1);
  font: inherit;
  font-size: var(--fs-meta);
  padding: 0 10px;
  height: 24px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.chan-add__submit:hover {
  background: var(--copad-accent);
  color: var(--copad-bg);
  border-color: var(--copad-accent);
}
.chan-add__submit:disabled { opacity: 0.4; cursor: not-allowed; }

.chan-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: var(--s-4) var(--s-4) var(--s-7);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.chan-list::-webkit-scrollbar { width: 8px; }
.chan-list::-webkit-scrollbar-track { background: transparent; }
.chan-list::-webkit-scrollbar-thumb {
  background: var(--copad-surface1);
  border-radius: 4px;
}
.chan-list__empty {
  margin: var(--s-7) auto;
  color: var(--copad-subtext0);
  font-style: italic;
  font-size: var(--fs-body);
  text-align: center;
}
.chan-list__empty::before {
  content: "··· ";
  letter-spacing: 0.2em;
  color: var(--copad-overlay0);
}
.chan-list__empty::after {
  content: " ···";
  letter-spacing: 0.2em;
  color: var(--copad-overlay0);
}

/* §9.1 CHAN-ROW --------------------------------------------------------- */
.chan-row {
  --rail-color: var(--rail-read);
  display: grid;
  grid-template-columns: 56px 1fr auto;
  grid-template-areas:
    "rail body actions"
    "rail expand expand";
  align-items: start;
  gap: 0 var(--s-3);
  padding: var(--s-2) var(--s-3) var(--s-2) var(--s-2);
  background: color-mix(in oklab, var(--copad-surface0) 60%, transparent);
  border-left: var(--rail-w) solid var(--rail-color);
  border-left-color: color-mix(in oklab, var(--rail-color) 40%, transparent);
  border-radius: 0 4px 4px 0;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.chan-row:hover {
  background: color-mix(in oklab, var(--copad-surface1) 85%, transparent);
  border-left-color: var(--rail-color);
}
.chan-row:focus-visible {
  outline: 1px solid var(--copad-accent);
  outline-offset: 2px;
}
.chan-row--expanded {
  background: var(--copad-surface1);
  border-left-color: var(--rail-color);
  padding-block: var(--s-3) var(--s-4);
  cursor: default;
}
.chan-row--read    { --rail-color: var(--rail-read); }
.chan-row--collect { --rail-color: var(--rail-collect); }
.chan-row--bot-rpc { --rail-color: var(--rail-bot); }

.chan-row__rail {
  grid-area: rail;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding-top: 2px;
}
.chan-row__badge {
  font-size: var(--fs-meta);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: color-mix(in oklab, var(--rail-color) 80%, var(--copad-text));
  font-weight: 600;
}
.chan-row__body {
  grid-area: body;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.chan-row__head {
  display: flex;
  gap: var(--s-2);
  align-items: baseline;
  flex-wrap: wrap;
  font-size: var(--fs-id);
}
.chan-row__id   { color: var(--copad-text); font-weight: 600; }
.chan-row__name { color: var(--copad-subtext1); font-weight: 400; }
.chan-row__name::before {
  content: "#";
  color: var(--copad-overlay0);
  margin-right: 1px;
}
.chan-row__sub {
  color: var(--copad-subtext0);
  font-size: var(--fs-meta);
  font-style: italic;
}
.chan-row__actions {
  grid-area: actions;
  display: flex;
  gap: var(--s-1);
  align-self: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-med);
}
.chan-row:hover .chan-row__actions,
.chan-row:focus-within .chan-row__actions,
.chan-row--expanded .chan-row__actions {
  opacity: 1;
  pointer-events: auto;
}
.chan-row__action {
  background: transparent;
  border: 0;
  color: var(--copad-subtext0);
  font: inherit;
  font-size: var(--fs-meta);
  letter-spacing: 0.04em;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
}
.chan-row__action:hover {
  background: var(--copad-surface2);
  color: var(--copad-text);
}
.chan-row__action--danger:hover {
  background: var(--copad-red);
  color: var(--copad-bg);
}

.chan-row__expand {
  grid-area: expand;
  margin-top: var(--s-3);
  display: none;
  flex-direction: column;
  gap: var(--s-3);
}
.chan-row--expanded .chan-row__expand { display: flex; }

/* §9.2 CHAN-FORM -------------------------------------------------------- */
.chan-form {
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
}
.chan-form__field {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  font-size: var(--fs-body);
}
.chan-form__label {
  width: 110px;
  flex-shrink: 0;
  color: var(--copad-subtext0);
  font-size: var(--fs-meta);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.chan-form__input,
.chan-form__select,
.chan-form__textarea {
  flex: 1;
  background: var(--copad-surface0);
  border: 1px solid var(--copad-surface2);
  color: var(--copad-text);
  font: inherit;
  font-size: var(--fs-body);
  padding: 4px 8px;
  border-radius: 3px;
}
.chan-form__input,
.chan-form__select { height: 24px; }
.chan-form__textarea {
  resize: vertical;
  min-height: 48px;
  line-height: 1.45;
}
.chan-form__input:focus,
.chan-form__select:focus,
.chan-form__textarea:focus {
  outline: 1px solid var(--copad-accent);
  outline-offset: 1px;
  border-color: var(--copad-accent);
}
.chan-form__hint {
  font-size: var(--fs-meta);
  color: var(--copad-subtext0);
  font-style: italic;
  padding-left: 118px;
  margin-top: -4px;
}
.chan-form__row-actions {
  display: flex;
  gap: var(--s-2);
  justify-content: flex-end;
  padding-top: var(--s-2);
  border-top: 1px solid var(--copad-overlay0);
}
.chan-form__btn {
  background: transparent;
  border: 1px solid var(--copad-surface2);
  color: var(--copad-subtext1);
  font: inherit;
  font-size: var(--fs-meta);
  padding: 4px 14px;
  height: 26px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
  letter-spacing: 0.04em;
}
.chan-form__btn:hover {
  background: var(--copad-surface2);
  color: var(--copad-text);
}
.chan-form__btn--primary {
  border-color: var(--copad-accent);
  color: var(--copad-accent);
}
.chan-form__btn--primary:hover {
  background: var(--copad-accent);
  color: var(--copad-bg);
}

/* §9.3 CHAN-BOTRPC ------------------------------------------------------ */
.chan-botrpc {
  display: none;
  flex-direction: column;
  gap: var(--s-3);
  padding: var(--s-3);
  background: color-mix(in oklab, var(--copad-surface0) 80%, transparent);
  border-left: 2px solid var(--rail-bot);
  border-radius: 0 3px 3px 0;
}
.chan-form[data-profile="bot-rpc"] .chan-botrpc { display: flex; }
.chan-botrpc__head {
  font-size: var(--fs-meta);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--rail-bot);
  font-weight: 600;
}

/* §10 COMPOSER ---------------------------------------------------------- */
.slack-composer {
  display: flex;
  flex-direction: column;
  background: color-mix(in oklab, var(--copad-surface2) 92%, transparent);
  border-top: 1px solid var(--copad-overlay0);
  padding: var(--s-2) var(--s-4);
  flex-shrink: 0;
  transition: padding var(--t-fast);
}
.slack-composer__row {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  height: 32px;
}
.slack-composer__row::before {
  content: "›";
  color: var(--copad-subtext0);
  font-size: var(--fs-id);
  flex-shrink: 0;
}
.slack-composer__channel {
  background: var(--copad-surface0);
  border: 1px solid var(--copad-surface2);
  color: var(--copad-text);
  font: inherit;
  font-size: var(--fs-body);
  padding: 4px 8px;
  height: 24px;
  border-radius: 3px;
  width: 120px;
  letter-spacing: 0.02em;
}
.slack-composer__channel:focus {
  outline: 1px solid var(--copad-accent);
  outline-offset: 1px;
  border-color: var(--copad-accent);
}
.slack-composer__channel:read-only {
  opacity: 0.7;
  cursor: not-allowed;
}
.slack-composer__divider {
  width: 1px;
  height: 16px;
  background: var(--copad-overlay0);
  flex-shrink: 0;
}
.slack-composer__textarea {
  flex: 1;
  background: var(--copad-surface0);
  border: 1px solid var(--copad-surface2);
  color: var(--copad-text);
  font: inherit;
  font-size: var(--fs-body);
  padding: 4px 8px;
  height: 24px;
  min-height: 24px;
  border-radius: 3px;
  resize: none;
  line-height: 1.45;
  transition: height var(--t-fast), border-color var(--t-fast);
}
.slack-composer__textarea::placeholder {
  color: var(--copad-subtext0);
  font-style: italic;
}
.slack-composer__textarea:focus {
  outline: 1px solid var(--copad-accent);
  outline-offset: 1px;
  border-color: var(--copad-accent);
  height: 96px;
}
.slack-composer__send {
  background: transparent;
  border: 1px solid var(--copad-surface2);
  color: var(--copad-subtext1);
  font: inherit;
  font-size: var(--fs-meta);
  padding: 0 10px;
  height: 24px;
  border-radius: 3px;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
  flex-shrink: 0;
}
.slack-composer__send:hover {
  background: var(--copad-accent);
  color: var(--copad-bg);
  border-color: var(--copad-accent);
}
.slack-composer__send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.slack-composer__hint {
  font-size: var(--fs-meta);
  color: var(--copad-subtext0);
  font-style: italic;
  padding-top: 4px;
  padding-left: 18px;
  display: none;
}
.slack-composer__textarea:focus ~ .slack-composer__hint,
.slack-composer__textarea:not(:placeholder-shown) ~ .slack-composer__hint {
  display: block;
}

.slack-card__expand .slack-composer {
  background: color-mix(in oklab, var(--copad-surface0) 80%, transparent);
  border: 1px solid var(--copad-overlay0);
  border-radius: 4px;
  padding: var(--s-2);
}
.slack-card__expand .slack-composer__channel { width: 100px; }

/* §11 TOAST ------------------------------------------------------------- */
.slack-toast {
  position: fixed;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  z-index: 1000;
  pointer-events: none;
}
.slack-toast__item {
  background: color-mix(in oklab, var(--copad-surface2) 95%, transparent);
  color: var(--copad-text);
  border-left: 4px solid var(--copad-red);
  border-radius: 3px;
  padding: var(--s-2) var(--s-3);
  font-size: var(--fs-body);
  max-width: 360px;
  pointer-events: auto;
  cursor: pointer;
  animation: toastIn var(--t-med) ease-out;
}
.slack-toast__item--ok { border-left-color: var(--slack-ok); }
.slack-toast__code {
  display: block;
  font-size: var(--fs-meta);
  color: var(--copad-subtext0);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.slack-toast__msg { word-break: break-word; }

/* §12 SETUP ------------------------------------------------------------- */
.slack-setup {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: var(--s-7) var(--s-4);
  display: flex;
  flex-direction: column;
  gap: var(--s-4);
  max-width: 720px;
  margin-inline: auto;
}
.slack-setup__title {
  font-size: var(--fs-head);
  color: var(--copad-text);
  font-weight: 500;
  letter-spacing: -0.005em;
  margin: 0;
}
.slack-setup__body {
  color: var(--copad-subtext1);
  font-size: var(--fs-body);
  line-height: 1.6;
}
.slack-setup__error {
  border-left: 3px solid var(--copad-red);
  background: color-mix(in oklab, var(--copad-red) 8%, transparent);
  padding: var(--s-3) var(--s-4);
  border-radius: 0 3px 3px 0;
  color: var(--copad-text);
  font-size: var(--fs-body);
  white-space: pre-wrap;
  word-break: break-word;
}
.slack-setup__error strong {
  display: block;
  font-weight: 600;
  color: var(--copad-red);
  margin-bottom: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: var(--fs-meta);
}
.slack-setup__steps {
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
  counter-reset: step;
  list-style: none;
  margin: 0;
  padding: 0;
}
.slack-setup__steps li {
  counter-increment: step;
  padding-left: var(--s-7);
  position: relative;
  color: var(--copad-subtext1);
}
.slack-setup__steps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 0;
  width: 24px;
  height: 24px;
  border: 1px solid var(--copad-overlay0);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--copad-subtext0);
  font-size: var(--fs-meta);
}
.slack-setup__cmd {
  display: block;
  margin-top: var(--s-2);
  background: var(--copad-surface0);
  color: var(--copad-text);
  border: 1px solid var(--copad-surface2);
  border-radius: 3px;
  padding: var(--s-2) var(--s-3);
  font-size: var(--fs-body);
  white-space: pre-wrap;
  word-break: break-all;
  user-select: all;
}
.slack-setup__cmd::before {
  content: "$ ";
  color: var(--copad-subtext0);
}

/* §13 MOTION ------------------------------------------------------------ */
@keyframes signalPulse {
  0%   { box-shadow: 0 0 0 0    color-mix(in oklab, var(--slack-ok) 60%, transparent); }
  70%  { box-shadow: 0 0 0 6px  color-mix(in oklab, var(--slack-ok)  0%, transparent); }
  100% { box-shadow: 0 0 0 0    color-mix(in oklab, var(--slack-ok)  0%, transparent); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(8px); }
  to   { opacity: 1; transform: translateX(0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
  .slack-card:hover { transform: none; }
}

/* §14 UTIL -------------------------------------------------------------- */
.visually-hidden {
  position: absolute !important;
  width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
}
.copy-id {
  background: transparent;
  border: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
  padding: 0;
}
.copy-id:hover { color: var(--copad-accent); }
</style>
</head>
<body>
<div class="slack-shell">

  <header class="slack-header" id="header" aria-label="Slack auth status">
    <div class="slack-header__dot" id="status-dot"></div>
    <div class="slack-header__workspace" id="workspace-label">…</div>
    <div class="slack-header__meta" id="header-meta"></div>
    <div class="slack-header__spacer"></div>
    <button class="slack-header__refresh" id="refresh-btn" type="button">refresh</button>
  </header>

  <nav class="slack-tabs" id="tabs" role="tablist" hidden>
    <button class="slack-tabs__tab" data-tab="feed" type="button" role="tab">
      FEED<span class="slack-tabs__count" id="tab-count-feed"> 0</span>
    </button>
    <button class="slack-tabs__tab" data-tab="channels" type="button" role="tab">
      CHANNELS<span class="slack-tabs__count" id="tab-count-channels"> 0</span>
    </button>
  </nav>

  <!-- Feed sub-filter (visible only when tab=feed) -->
  <nav class="slack-filter" id="filter" role="tablist" hidden>
    <button class="slack-filter__chip" data-filter="all" type="button" role="tab">
      ALL<span class="slack-filter__count" data-count="all"> 0</span>
    </button>
    <button class="slack-filter__chip" data-filter="mention" type="button" role="tab">
      MENTIONS<span class="slack-filter__count" data-count="mention"> 0</span>
    </button>
    <button class="slack-filter__chip" data-filter="dm" type="button" role="tab">
      DMS<span class="slack-filter__count" data-count="dm"> 0</span>
    </button>
    <button class="slack-filter__chip" data-filter="reaction" type="button" role="tab">
      REACTIONS<span class="slack-filter__count" data-count="reaction"> 0</span>
    </button>
  </nav>

  <!-- Channel add row (visible only when tab=channels) -->
  <form class="chan-add" id="chan-add" hidden>
    <input class="chan-add__input" id="chan-add-id" type="text"
           placeholder="C01ABC… (channel id)" spellcheck="false"
           autocomplete="off" required />
    <select class="chan-add__select" id="chan-add-profile" aria-label="profile">
      <option value="read">read</option>
      <option value="collect">collect</option>
      <option value="bot-rpc">bot-rpc</option>
    </select>
    <button class="chan-add__submit" id="chan-add-submit" type="submit">ADD</button>
  </form>

  <main id="main" class="slack-feed" aria-live="polite"></main>

  <footer class="slack-composer" id="composer" hidden>
    <div class="slack-composer__row">
      <input class="slack-composer__channel" id="composer-channel"
             type="text" placeholder="C01ABC…" autocomplete="off"
             spellcheck="false" />
      <div class="slack-composer__divider"></div>
      <textarea class="slack-composer__textarea" id="composer-text"
                placeholder="reply or send raw…" rows="1"
                spellcheck="false"></textarea>
      <button class="slack-composer__send" id="composer-send" type="button">SEND</button>
    </div>
    <div class="slack-composer__hint">⌘+enter to send · esc to collapse</div>
  </footer>

</div>

<div class="slack-toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

/* ========================================================================
   slack/panel.html — JS
   Two internal views: FEED (event log) and CHANNELS (registry). The tab
   strip toggles visibility — both are mounted, only one is rendered into.
   ----------------------------------------------------------------------
   localStorage keys:
     * slack-tab               "feed"|"channels"  (active view)
     * slack-filter            feed sub-filter
     * slack-expanded          feed cards expanded
     * slack-channels-expanded channel rows expanded
     * slack-composer-draft    composer text
   ======================================================================== */

const LS = {
  tab:       'slack-tab',
  filter:    'slack-filter',
  expanded:  'slack-expanded',
  chanExp:   'slack-channels-expanded',
  draft:     'slack-composer-draft',
};

const state = {
  auth: null,
  authError: null,
  activeTab: localStorage.getItem(LS.tab) || 'feed',
  // FEED
  filter: localStorage.getItem(LS.filter) || 'all',
  events: [],
  expanded: new Set(safeJSON(localStorage.getItem(LS.expanded)) || []),
  bodies: new Map(),
  ready: false,
  pending: [],
  // CHANNELS
  channels: [],
  channelsLoaded: false,
  chanExpanded: new Set(safeJSON(localStorage.getItem(LS.chanExp)) || []),
  chanDrafts: new Map(),
};

function safeJSON(s) { try { return JSON.parse(s); } catch { return null; } }
function persistExpanded()  { localStorage.setItem(LS.expanded, JSON.stringify([...state.expanded])); }
function persistChanExp()   { localStorage.setItem(LS.chanExp,  JSON.stringify([...state.chanExpanded])); }

/* DOM refs ------------------------------------------------------------- */
const $ = (id) => document.getElementById(id);
const dom = {
  shell:     document.querySelector('.slack-shell'),
  dot:       $('status-dot'),
  workspace: $('workspace-label'),
  meta:      $('header-meta'),
  refresh:   $('refresh-btn'),
  tabs:      $('tabs'),
  tabCountFeed:     $('tab-count-feed'),
  tabCountChannels: $('tab-count-channels'),
  filter:    $('filter'),
  chanAdd:        $('chan-add'),
  chanAddId:      $('chan-add-id'),
  chanAddProfile: $('chan-add-profile'),
  chanAddSubmit:  $('chan-add-submit'),
  main:      $('main'),
  composer:  $('composer'),
  composerChannel: $('composer-channel'),
  composerText:    $('composer-text'),
  composerSend:    $('composer-send'),
  toast:     $('toast'),
};

const ESC_MAP = { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' };
function esc(s) { return String(s ?? '').replace(/[<>&"']/g, c => ESC_MAP[c]); }

function relTime(tsStr) {
  const sec = Date.now() / 1000 - parseFloat(tsStr);
  if (!isFinite(sec) || sec < 0) return '—';
  if (sec < 60)    return 'now';
  if (sec < 3600)  return `${Math.floor(sec / 60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec / 3600)}h ago`;
  return `${Math.floor(sec / 86400)}d ago`;
}
function tsClock(tsStr) {
  const d = new Date(parseFloat(tsStr) * 1000);
  if (isNaN(d.getTime())) return '——:——';
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
// `unixMs` is the server's millisecond timestamp from ChannelStore.upsert.
// Negative ages clamp to "just now" via the < 60 branch so minor clock
// skew between writer and reader doesn't render as "—".
function relTimeMs(unixMs) {
  if (!unixMs) return '—';
  const sec = (Date.now() - unixMs) / 1000;
  if (!isFinite(sec)) return '—';
  if (sec < 60)    return 'just now';
  if (sec < 3600)  return `${Math.floor(sec / 60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec / 3600)}h ago`;
  return `${Math.floor(sec / 86400)}d ago`;
}

/* Auth + channels refresh --------------------------------------------- */
async function refreshAll() {
  dom.refresh.disabled = true;
  try {
    state.auth = await copad.call('slack.auth_status', {});
    state.authError = null;
  } catch (err) {
    state.auth = null;
    state.authError = {
      code: err.code || 'auth_status_failed',
      message: err.message || String(err),
    };
  }
  if (state.auth && state.auth.authenticated) {
    try {
      const res = await copad.call('slack.channels.list', {});
      state.channels = Array.isArray(res?.channels) ? res.channels : [];
      state.channelsLoaded = true;
    } catch (err) {
      state.channels = [];
      toast(err.code || 'channels_list_failed', err.message || String(err));
    }
  }
  dom.refresh.disabled = false;
  renderHeader();
  renderBody();
  flushPending();
}

function renderHeader() {
  const a = state.auth || {};
  if (state.authError) {
    dom.workspace.textContent = 'slack · transport error';
    dom.dot.className = 'slack-header__dot slack-header__dot--err';
    dom.dot.title = state.authError.message;
    dom.meta.innerHTML = `<em>${esc(state.authError.code)}</em>`;
    return;
  }
  dom.workspace.textContent = a.workspace || '…';
  let dotClass = '';
  if (a.authenticated)      dotClass = 'slack-header__dot--ok';
  else if (a.configured)    dotClass = 'slack-header__dot--warn';
  else                      dotClass = 'slack-header__dot--err';
  dom.dot.className = `slack-header__dot ${dotClass}`;
  dom.dot.title = a.authenticated
    ? 'connected'
    : a.configured ? 'configured · not signed in' : 'not configured';

  const meta = [];
  if (a.team_id) meta.push(`team <strong>${esc(a.team_id)}</strong>`);
  if (a.user_id) meta.push(`bot <strong>${esc(a.user_id)}</strong>`);
  if (a.credentials_source && a.credentials_source !== 'none') {
    meta.push(`source <strong>${esc(a.credentials_source)}</strong>`);
  }
  dom.meta.innerHTML = meta.join(' · ');
}

function renderBody() {
  if (state.authError) {
    dom.tabs.hidden = true;
    dom.filter.hidden = true;
    dom.chanAdd.hidden = true;
    dom.composer.hidden = true;
    renderTransportError();
    return;
  }
  const a = state.auth || {};
  const ok = a.configured && a.authenticated;
  if (!ok) {
    dom.tabs.hidden = true;
    dom.filter.hidden = true;
    dom.chanAdd.hidden = true;
    dom.composer.hidden = true;
    renderSetup();
    return;
  }
  dom.tabs.hidden = false;
  renderTabsCounts();
  if (state.activeTab === 'channels') {
    dom.filter.hidden = true;
    dom.chanAdd.hidden = false;
    dom.composer.hidden = true;
    renderChannelsList();
  } else {
    dom.filter.hidden = false;
    dom.chanAdd.hidden = true;
    dom.composer.hidden = false;
    renderFeed();
  }
}

function renderTabsCounts() {
  dom.tabCountFeed.textContent = ` ${state.events.length}`;
  dom.tabCountChannels.textContent = ` ${state.channels.length}`;
  dom.tabs.querySelectorAll('.slack-tabs__tab').forEach(b => {
    b.classList.toggle('slack-tabs__tab--active', b.dataset.tab === state.activeTab);
  });
}

/* §12 SETUP render ----------------------------------------------------- */
function renderTransportError() {
  const e = state.authError;
  dom.main.className = 'slack-setup';
  dom.main.innerHTML = `
    <h1 class="slack-setup__title">slack plugin · transport error</h1>
    <p class="slack-setup__body">
      The <code>slack.auth_status</code> call failed before the plugin
      could respond. The supervisor probably hasn't started the slack
      service, or the IPC connection broke. Try refresh after a moment;
      if it persists, check copad's stderr (e.g. <code>journalctl --user -u copad</code>
      or the launching terminal's output) for service-supervisor messages.
    </p>
    <section class="slack-setup__error">
      <strong>${esc(e.code)}</strong>${esc(e.message)}
    </section>
  `;
}

function renderSetup() {
  const a = state.auth || {};
  const fatal = a.fatal_error;
  const errBlock = fatal ? `
    <section class="slack-setup__error">
      <strong>fatal_error</strong>${esc(fatal)}
    </section>` : '';
  const status = a.configured
    ? `Slack plugin is configured but no credentials are signed in (<code>credentials_source = ${esc(a.credentials_source || 'none')}</code>). Run the auth command below and restart copad.`
    : `Slack plugin is not configured. Required env vars are missing or invalid; run the auth command below and restart copad.`;
  dom.main.className = 'slack-setup';
  dom.main.innerHTML = `
    <h1 class="slack-setup__title">slack plugin · setup</h1>
    <p class="slack-setup__body">${status}</p>
    ${errBlock}
    <ol class="slack-setup__steps">
      <li>Create a Slack app at <code>api.slack.com/apps</code>; enable Socket Mode and generate an App-Level Token (<code>xapp-…</code>) with <code>connections:write</code>.</li>
      <li>Subscribe to bot events: <code>app_mention</code>, <code>message.im</code>, <code>reaction_added</code>.</li>
      <li>Add bot scopes: <code>app_mentions:read</code>, <code>im:history</code>, <code>users:read</code>, <code>chat:write</code>, <code>reactions:read</code>, <code>channels:history</code>.</li>
      <li>Install to your workspace; copy the Bot User OAuth Token (<code>xoxb-…</code>).</li>
      <li>Persist the credentials and verify against Slack:
        <code class="slack-setup__cmd">COPAD_SLACK_BOT_TOKEN=xoxb-… COPAD_SLACK_APP_TOKEN=xapp-… copad-plugin-slack auth</code>
      </li>
      <li>Restart copad. The Socket Mode loop reconnects automatically.</li>
    </ol>
  `;
}

/* §7 FEED render ------------------------------------------------------- */
function renderFeed() {
  dom.main.className = 'slack-feed';
  const filtered = state.events.filter(matchesFilter);
  if (filtered.length === 0) {
    dom.main.innerHTML = `<div class="slack-feed__empty">waiting for mentions, dms, reactions</div>`;
  } else {
    dom.main.innerHTML = filtered.map(renderCard).join('');
  }
  renderFilterCounts();
}

function matchesFilter(ev) {
  return state.filter === 'all' || ev.kind === state.filter;
}

function renderFilterCounts() {
  const counts = { all: 0, mention: 0, dm: 0, reaction: 0 };
  for (const ev of state.events) {
    counts.all++;
    if (counts[ev.kind] !== undefined) counts[ev.kind]++;
  }
  for (const k of Object.keys(counts)) {
    const el = dom.filter.querySelector(`[data-count="${k}"]`);
    if (el) el.textContent = ` ${counts[k]}`;
  }
  dom.filter.querySelectorAll('.slack-filter__chip').forEach(b => {
    b.classList.toggle('slack-filter__chip--active', b.dataset.filter === state.filter);
  });
}

function renderCard(ev) {
  const expanded = state.expanded.has(ev.id);
  const cls = `slack-card slack-card--${ev.kind}${expanded ? ' slack-card--expanded' : ''}`;
  const p = ev.payload;
  const channelLabel = ev.kind === 'dm' ? '─direct' : esc(p.channel || '?');
  const user = p.user || p.item_user || '?';
  let badge, preview;
  if (ev.kind === 'mention') {
    badge = 'MEN';
    preview = esc((p.text || '').trim() || '(no text)');
  } else if (ev.kind === 'dm') {
    badge = 'DM';
    preview = esc((p.text || '').trim() || '(no text)');
  } else {
    badge = `:${esc(p.reaction || '?')}:`;
    preview = `ts ${esc(p.ts || '?')}`;
  }
  const sentFooter = ev.sentAt
    ? `<div class="slack-card__sent">✓ sent ${esc(ev.sentAt)}</div>` : '';

  let rxnBody = '';
  if (ev.kind === 'reaction' && expanded) {
    const key = `${p.channel}:${p.ts}`;
    const cached = state.bodies.get(key);
    rxnBody = `<div class="slack-card__rxn-body${cached === undefined ? ' slack-card__rxn-body--loading' : ''}"
                    data-rxn-body="${esc(key)}">${cached === undefined ? 'fetching…' : esc(cached || '(empty)')}</div>`;
  }

  const replyChannel = p.channel || '';
  const replyThread  = p.thread_ts || p.ts || '';
  const replyComposer = expanded && (ev.kind === 'mention' || ev.kind === 'dm') ? `
    <form class="slack-composer slack-composer--reply" data-reply="${esc(ev.id)}">
      <div class="slack-composer__row">
        <input class="slack-composer__channel" type="text"
               value="${esc(replyChannel)}" readonly />
        <div class="slack-composer__divider"></div>
        <textarea class="slack-composer__textarea" name="text"
                  placeholder="reply in thread…" rows="1"
                  spellcheck="false"></textarea>
        <button class="slack-composer__send" type="submit">REPLY</button>
      </div>
      <div class="slack-composer__hint">thread_ts ${esc(replyThread)} · ⌘+enter / esc</div>
    </form>` : '';

  return `
    <article class="${cls}" data-event-id="${esc(ev.id)}" tabindex="0">
      <div class="slack-card__rail">
        <span class="slack-card__badge">${badge}</span>
        <span class="slack-card__ts">${esc(tsClock(p.ts || '0'))}</span>
      </div>
      <div class="slack-card__body">
        <div class="slack-card__head">
          <span class="slack-card__channel">${channelLabel}</span>
          <span class="slack-card__user">@${esc(user)}</span>
          <span class="slack-card__rel">${esc(relTime(p.ts || '0'))}</span>
        </div>
        <div class="slack-card__preview">${preview}</div>
      </div>
      <div class="slack-card__actions">
        <button class="slack-card__action" data-act="copy-ts" data-ts="${esc(p.ts || '')}" type="button">copy ts</button>
        ${p.permalink ? `<a class="slack-card__action" href="${esc(p.permalink)}" target="_blank" rel="noopener">open</a>` : ''}
      </div>
      <div class="slack-card__expand">
        ${rxnBody}
        ${replyComposer}
        ${sentFooter}
      </div>
    </article>`;
}

/* §9 CHANNELS render --------------------------------------------------- */
function renderChannelsList() {
  dom.main.className = 'chan-list';
  if (state.channels.length === 0) {
    dom.main.innerHTML = `<div class="chan-list__empty">no channels yet · add one above</div>`;
    return;
  }
  // bot-rpc first (interactive), then collect, then read. Within group,
  // alphabetical by id — stable ordering helps user re-locate rows.
  const order = { 'bot-rpc': 0, 'collect': 1, 'read': 2 };
  const sorted = [...state.channels].sort((a, b) => {
    const diff = (order[a.profile] ?? 9) - (order[b.profile] ?? 9);
    return diff !== 0 ? diff : a.id.localeCompare(b.id);
  });
  dom.main.innerHTML = sorted.map(renderChanRow).join('');
}

function profileBadge(profile) {
  if (profile === 'read')    return 'READ';
  if (profile === 'collect') return 'COL';
  if (profile === 'bot-rpc') return 'BOT';
  return '?';
}

function renderChanRow(ch) {
  const expanded = state.chanExpanded.has(ch.id);
  const draft = state.chanDrafts.get(ch.id) || ch;
  const cls = `chan-row chan-row--${ch.profile}${expanded ? ' chan-row--expanded' : ''}`;
  const displayName = ch.name || (ch.id.startsWith('D') ? '(direct message)' : '(no name)');
  const sub = `${ch.profile} · updated ${esc(relTimeMs(ch.updated_at))}`;
  return `
    <article class="${cls}" data-channel-id="${esc(ch.id)}" tabindex="0">
      <div class="chan-row__rail">
        <span class="chan-row__badge">${profileBadge(ch.profile)}</span>
      </div>
      <div class="chan-row__body">
        <div class="chan-row__head">
          <span class="chan-row__id">${esc(ch.id)}</span>
          <span class="chan-row__name">${esc(displayName)}</span>
        </div>
        <div class="chan-row__sub">${sub}</div>
      </div>
      <div class="chan-row__actions">
        <button class="chan-row__action" data-act="copy-id" type="button">copy id</button>
        <button class="chan-row__action chan-row__action--danger" data-act="delete" type="button">delete</button>
      </div>
      <div class="chan-row__expand">${expanded ? renderChanEditForm(draft) : ''}</div>
    </article>`;
}

function renderChanEditForm(ch) {
  const cfg = ch.bot_rpc || {
    default_template: '',
    wait_mode: 'first-reply',
    wait_regex: '',
    wait_user_filter: '',
    wait_timeout_ms: 30000,
  };
  return `
    <form class="chan-form" data-profile="${esc(ch.profile)}" data-edit-id="${esc(ch.id)}">
      <div class="chan-form__field">
        <label class="chan-form__label" for="edit-name-${esc(ch.id)}">name</label>
        <input class="chan-form__input" id="edit-name-${esc(ch.id)}"
               name="name" value="${esc(ch.name || '')}" maxlength="80"
               placeholder="${ch.id.startsWith('D') ? 'DM with @bob' : '(auto from Slack)'}"
               spellcheck="false" autocomplete="off" />
      </div>
      <div class="chan-form__field">
        <label class="chan-form__label" for="edit-profile-${esc(ch.id)}">profile</label>
        <select class="chan-form__select" id="edit-profile-${esc(ch.id)}" name="profile">
          <option value="read"    ${ch.profile === 'read'    ? 'selected' : ''}>read — observe only</option>
          <option value="collect" ${ch.profile === 'collect' ? 'selected' : ''}>collect — capture to knowledge base</option>
          <option value="bot-rpc" ${ch.profile === 'bot-rpc' ? 'selected' : ''}>bot-rpc — send + wait for response</option>
        </select>
      </div>

      <fieldset class="chan-botrpc">
        <div class="chan-botrpc__head">bot-rpc settings</div>
        <div class="chan-form__field">
          <label class="chan-form__label" for="edit-template-${esc(ch.id)}">template</label>
          <textarea class="chan-form__textarea" id="edit-template-${esc(ch.id)}"
                    name="default_template" maxlength="4000"
                    placeholder="default message (leave empty to type each time)"
                    spellcheck="false">${esc(cfg.default_template || '')}</textarea>
        </div>
        <div class="chan-form__field">
          <label class="chan-form__label" for="edit-waitmode-${esc(ch.id)}">wait for</label>
          <select class="chan-form__select" id="edit-waitmode-${esc(ch.id)}" name="wait_mode">
            <option value="first-reply" ${cfg.wait_mode === 'first-reply' ? 'selected' : ''}>first reply (any)</option>
            <option value="regex"       ${cfg.wait_mode === 'regex'       ? 'selected' : ''}>regex match</option>
          </select>
        </div>
        <div class="chan-form__field">
          <label class="chan-form__label" for="edit-regex-${esc(ch.id)}">regex</label>
          <input class="chan-form__input" id="edit-regex-${esc(ch.id)}"
                 name="wait_regex" value="${esc(cfg.wait_regex || '')}"
                 placeholder="^(?&lt;key&gt;[A-Z]+-\\d+)" spellcheck="false" />
        </div>
        <div class="chan-form__hint">
          required when wait mode is regex. matches must be valid Rust regex.
        </div>
        <div class="chan-form__field">
          <label class="chan-form__label" for="edit-userfilter-${esc(ch.id)}">from user</label>
          <input class="chan-form__input" id="edit-userfilter-${esc(ch.id)}"
                 name="wait_user_filter" value="${esc(cfg.wait_user_filter || '')}"
                 placeholder="U0BOT123 (empty = any)" spellcheck="false" />
        </div>
        <div class="chan-form__field">
          <label class="chan-form__label" for="edit-timeout-${esc(ch.id)}">timeout (ms)</label>
          <input class="chan-form__input" id="edit-timeout-${esc(ch.id)}"
                 name="wait_timeout_ms" type="number" min="0" max="3600000"
                 value="${esc(String(cfg.wait_timeout_ms ?? 30000))}" />
        </div>
        <div class="chan-form__hint">
          0 = wait forever. max 3,600,000 (1 hour).
        </div>
      </fieldset>

      <div class="chan-form__row-actions">
        <button class="chan-form__btn" type="button" data-act="cancel">CANCEL</button>
        <button class="chan-form__btn chan-form__btn--primary" type="submit">SAVE</button>
      </div>
    </form>`;
}

function readChanDraft(form) {
  const id = form.dataset.editId;
  const fd = new FormData(form);
  const profile = fd.get('profile') || 'read';
  return {
    id,
    name: (fd.get('name') || '').toString().trim(),
    profile,
    bot_rpc: {
      default_template: (fd.get('default_template') || '').toString(),
      wait_mode: fd.get('wait_mode') || 'first-reply',
      wait_regex: (fd.get('wait_regex') || '').toString(),
      wait_user_filter: (fd.get('wait_user_filter') || '').toString().trim(),
      wait_timeout_ms: Math.max(0, parseInt(fd.get('wait_timeout_ms'), 10) || 0),
    },
  };
}

/* Event ingest --------------------------------------------------------- */
function makeEventId(kind, payload) {
  if (payload.event_id) return `${kind}:${payload.event_id}`;
  return `${kind}:${payload.channel || '?'}:${payload.ts || Date.now()}`;
}

function ingestEvent(kind, payload) {
  if (!state.ready) {
    state.pending.push({ kind, payload });
    return;
  }
  const id = makeEventId(kind, payload);
  if (state.events.some(e => e.id === id)) return;
  state.events.unshift({ id, kind, payload });
  if (state.events.length > 200) state.events.length = 200;
  scheduleRender();
}

function flushPending() {
  state.ready = true;
  const buf = state.pending;
  state.pending = [];
  for (const { kind, payload } of buf) ingestEvent(kind, payload);
}

let renderRAF = 0;
function scheduleRender() {
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(() => {
    renderRAF = 0;
    if (state.auth?.authenticated) renderBody();
  });
}

/* Reaction body fetch -------------------------------------------------- */
async function fetchReactionBody(channel, ts) {
  const key = `${channel}:${ts}`;
  if (state.bodies.has(key)) return;
  state.bodies.set(key, undefined);
  try {
    const msg = await copad.call('slack.get_message', { channel, ts });
    const body = (msg && (msg.text || msg.messages?.[0]?.text)) || '(no text)';
    state.bodies.set(key, body);
  } catch (err) {
    state.bodies.set(key, `(failed: ${err.message})`);
    toast('get_message', err.message);
  }
  scheduleRender();
}

/* Toast ---------------------------------------------------------------- */
function toast(code, msg, opts = {}) {
  const el = document.createElement('div');
  el.className = `slack-toast__item${opts.ok ? ' slack-toast__item--ok' : ''}`;
  el.innerHTML = `
    <span class="slack-toast__code">${esc(code)}</span>
    <span class="slack-toast__msg">${esc(msg)}</span>`;
  el.addEventListener('click', () => el.remove());
  dom.toast.appendChild(el);
  setTimeout(() => el.remove(), opts.ttl || 4000);
}

/* Send (feed view) ----------------------------------------------------- */
async function sendMessage(channel, text, threadTs, sourceEv) {
  if (!channel || !text.trim()) return;
  try {
    await copad.call('slack.post_message', {
      channel,
      text,
      ...(threadTs ? { thread_ts: threadTs } : {}),
    });
    if (sourceEv) {
      sourceEv.sentAt = new Date().toLocaleTimeString([], { hour12: false });
      scheduleRender();
    }
    return true;
  } catch (err) {
    toast(err.code || 'post_message', err.message);
    return false;
  }
}

/* Wire up -------------------------------------------------------------- */
function bindTabs() {
  dom.tabs.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    state.activeTab = btn.dataset.tab;
    localStorage.setItem(LS.tab, state.activeTab);
    renderBody();
  });
}

function bindFilter() {
  dom.filter.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    state.filter = btn.dataset.filter;
    localStorage.setItem(LS.filter, state.filter);
    renderFeed();
  });
}

function bindFeed() {
  dom.main.addEventListener('click', (e) => {
    if (state.activeTab !== 'feed') return;
    const action = e.target.closest('[data-act]');
    if (action) {
      e.stopPropagation();
      if (action.dataset.act === 'copy-ts' && action.dataset.ts) {
        navigator.clipboard.writeText(action.dataset.ts).catch(() => {});
      }
      return;
    }
    if (e.target.closest('a, button, textarea, input, form')) return;

    const card = e.target.closest('.slack-card');
    if (!card) return;
    const id = card.dataset.eventId;
    const wasExpanded = state.expanded.has(id);
    if (wasExpanded) state.expanded.delete(id);
    else state.expanded.add(id);
    persistExpanded();
    renderFeed();

    if (!wasExpanded) {
      const ev = state.events.find(x => x.id === id);
      if (ev?.kind === 'reaction') {
        fetchReactionBody(ev.payload.channel, ev.payload.ts);
      }
      requestAnimationFrame(() => {
        const ta = dom.main.querySelector(
          `[data-event-id="${cssEscape(id)}"] .slack-composer__textarea`);
        ta?.focus();
      });
    }
  });

  dom.main.addEventListener('submit', async (e) => {
    if (state.activeTab !== 'feed') return;
    const form = e.target.closest('form[data-reply]');
    if (!form) return;
    e.preventDefault();
    const id = form.dataset.reply;
    const ev = state.events.find(x => x.id === id);
    if (!ev) return;
    const ta = form.querySelector('textarea[name=text]');
    const ok = await sendMessage(
      ev.payload.channel,
      ta.value,
      ev.payload.thread_ts || ev.payload.ts,
      ev);
    if (ok) ta.value = '';
  });

  dom.main.addEventListener('keydown', (e) => {
    if (state.activeTab !== 'feed') return;
    if (e.target.matches('form[data-reply] textarea')) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        e.target.closest('form').requestSubmit();
      } else if (e.key === 'Escape') {
        const card = e.target.closest('.slack-card');
        if (card) {
          state.expanded.delete(card.dataset.eventId);
          persistExpanded();
          renderFeed();
        }
      }
    }
  });
}

function bindChannels() {
  dom.chanAdd.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = dom.chanAddId.value.trim().toUpperCase();
    const profile = dom.chanAddProfile.value;
    if (!id) {
      toast('invalid_params', 'channel id required');
      return;
    }
    const params = { id, profile };
    if (profile === 'bot-rpc') {
      // Minimal default config so server validation passes — user
      // refines after expand.
      params.bot_rpc = {
        default_template: '',
        wait_mode: 'first-reply',
        wait_regex: '',
        wait_user_filter: '',
        wait_timeout_ms: 30000,
      };
    }
    try {
      const res = await copad.call('slack.channels.upsert', params);
      const saved = res.channel;
      state.channels = [saved, ...state.channels.filter(c => c.id !== saved.id)];
      state.chanExpanded.add(saved.id);
      persistChanExp();
      dom.chanAddId.value = '';
      renderTabsCounts();
      renderChannelsList();
      toast('added', `${saved.id} (${saved.profile})`, { ok: true });
    } catch (err) {
      toast(err.code || 'upsert_failed', err.message || String(err));
    }
  });

  dom.main.addEventListener('click', async (e) => {
    if (state.activeTab !== 'channels') return;
    const action = e.target.closest('[data-act]');
    const row = e.target.closest('.chan-row');
    if (!row) return;
    const id = row.dataset.channelId;

    if (action) {
      e.stopPropagation();
      const act = action.dataset.act;
      if (act === 'copy-id') {
        navigator.clipboard.writeText(id).catch(() => {});
        return;
      }
      if (act === 'delete') {
        if (!confirm(`remove channel ${id}?`)) return;
        try {
          await copad.call('slack.channels.remove', { id });
          state.channels = state.channels.filter(c => c.id !== id);
          state.chanExpanded.delete(id);
          state.chanDrafts.delete(id);
          persistChanExp();
          renderTabsCounts();
          renderChannelsList();
        } catch (err) {
          toast(err.code || 'remove_failed', err.message || String(err));
        }
        return;
      }
      if (act === 'cancel') {
        state.chanExpanded.delete(id);
        state.chanDrafts.delete(id);
        persistChanExp();
        renderChannelsList();
        return;
      }
    }

    if (e.target.closest('form, input, select, textarea, button, label')) return;
    if (state.chanExpanded.has(id)) state.chanExpanded.delete(id);
    else state.chanExpanded.add(id);
    persistChanExp();
    renderChannelsList();
  });

  dom.main.addEventListener('change', (e) => {
    if (state.activeTab !== 'channels') return;
    const sel = e.target;
    if (sel.name !== 'profile' && sel.name !== 'wait_mode') return;
    const form = sel.closest('form[data-edit-id]');
    if (!form) return;
    if (sel.name === 'profile') {
      form.dataset.profile = sel.value;
      // Persist in-progress draft so toggling profile preserves input.
      state.chanDrafts.set(form.dataset.editId, readChanDraft(form));
    }
  });

  dom.main.addEventListener('submit', async (e) => {
    if (state.activeTab !== 'channels') return;
    const form = e.target.closest('form[data-edit-id]');
    if (!form) return;
    e.preventDefault();
    const draft = readChanDraft(form);
    const params = { id: draft.id, name: draft.name, profile: draft.profile };
    if (draft.profile === 'bot-rpc') params.bot_rpc = draft.bot_rpc;
    try {
      const res = await copad.call('slack.channels.upsert', params);
      const saved = res.channel;
      state.channels = state.channels.map(c => (c.id === saved.id ? saved : c));
      state.chanDrafts.delete(saved.id);
      state.chanExpanded.delete(saved.id);
      persistChanExp();
      renderTabsCounts();
      renderChannelsList();
      toast('saved', saved.id, { ok: true });
    } catch (err) {
      toast(err.code || 'save_failed', err.message || String(err));
    }
  });
}

function bindComposer() {
  dom.composerText.value = localStorage.getItem(LS.draft) || '';
  dom.composerText.addEventListener('input', () => {
    localStorage.setItem(LS.draft, dom.composerText.value);
  });
  dom.composerText.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      dom.composerSend.click();
    } else if (e.key === 'Escape') {
      dom.composerText.blur();
    }
  });
  dom.composerSend.addEventListener('click', async () => {
    const channel = dom.composerChannel.value.trim();
    const text = dom.composerText.value;
    if (!channel) {
      toast('invalid_params', "channel id required (e.g. C01ABC…)");
      return;
    }
    const ok = await sendMessage(channel, text);
    if (ok) {
      dom.composerText.value = '';
      localStorage.removeItem(LS.draft);
      dom.composerText.blur();
    }
  });
}

function bindHeader() {
  dom.refresh.addEventListener('click', refreshAll);
}

function cssEscape(s) {
  if (window.CSS?.escape) return CSS.escape(s);
  return String(s).replace(/[^\w-]/g, '\\$&');
}

function refreshRelTimes() {
  if (state.activeTab !== 'feed') return;
  for (const card of dom.main.querySelectorAll('.slack-card')) {
    const id = card.dataset.eventId;
    const ev = state.events.find(x => x.id === id);
    if (!ev) continue;
    const rel = card.querySelector('.slack-card__rel');
    if (rel) rel.textContent = relTime(ev.payload.ts || '0');
  }
}

/* Init ----------------------------------------------------------------- */
async function init() {
  bindHeader();
  bindTabs();
  bindFilter();
  bindFeed();
  bindChannels();
  bindComposer();

  copad.on('slack.mention',  ev => ingestEvent('mention',  ev));
  copad.on('slack.dm',       ev => ingestEvent('dm',       ev));
  copad.on('slack.reaction', ev => ingestEvent('reaction', ev));

  await refreshAll();
  setInterval(refreshRelTimes, 30 * 1000);
}

init().catch(err => {
  toast('init_failed', err.message || String(err));
  console.error('slack panel init failed:', err);
});
</script>
