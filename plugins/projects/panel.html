<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Projects</title>
<style>
  :root {
    --bg: #1e1e2e;
    --bg-alt: #181825;
    --bg-card: #313244;
    --fg: #cdd6f4;
    --fg-dim: #a6adc8;
    --fg-mute: #6c7086;
    --accent: #cba6f7;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --red: #f38ba8;
    --border: #45475a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  h2 { margin: 0 0 8px; font-size: 14px; color: var(--accent);
       text-transform: uppercase; letter-spacing: .04em; }
  section { margin-bottom: 24px; }
  section:last-child { margin-bottom: 0; }
  .empty {
    color: var(--fg-mute); font-style: italic; padding: 8px 0;
  }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .row:last-child { border: 0; }
  .label { color: var(--fg-dim); min-width: 88px; }
  .value { flex: 1; word-break: break-all; }
  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    background: var(--bg-card); color: var(--fg-dim);
    font-size: 11px; margin-right: 4px;
  }
  .chip.clickable { cursor: pointer; }
  .chip.clickable:hover { background: var(--accent); color: var(--bg); }
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
  }
  .card-title {
    display: flex; justify-content: space-between; gap: 8px;
    cursor: pointer;
  }
  .card-title:hover { color: var(--accent); }
  .card-desc { color: var(--fg-dim); font-size: 12px; margin-top: 4px; }
  .form { margin-top: 10px; }
  .form .field { margin-bottom: 8px; }
  .form label {
    display: block; color: var(--fg-dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px;
  }
  .form input, .form textarea, .form select {
    width: 100%; padding: 6px 8px;
    background: var(--bg-alt); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 13px;
  }
  .form textarea { min-height: 60px; resize: vertical; }
  .form button {
    background: var(--accent); color: var(--bg);
    border: 0; border-radius: 4px;
    padding: 6px 14px; cursor: pointer; font-weight: 600;
  }
  .form button:disabled {
    background: var(--fg-mute); cursor: not-allowed;
  }
  .form .err {
    color: var(--red); font-size: 12px; margin-top: 6px;
  }
  .status-running { color: var(--yellow); }
  .status-done    { color: var(--green); }
  .status-failed  { color: var(--red); }
  .status-timeout { color: var(--red); }
  .meta {
    color: var(--fg-mute); font-size: 11px;
  }
  .toggle-show-all {
    margin-left: auto; cursor: pointer; color: var(--fg-mute);
    font-size: 11px; text-decoration: underline;
  }
</style>
</head>
<body>

<section id="project-header">
  <h2>Active Project</h2>
  <div id="project-body" class="empty">Loading…</div>
</section>

<section id="workflows-section">
  <h2>Workflows</h2>
  <div id="workflows-body" class="empty">Loading…</div>
</section>

<section id="runs-section">
  <h2>
    Recent Runs
    <span class="meta" title="Cleared on copad restart — durable history lands in Phase 22.6">(in-memory)</span>
  </h2>
  <div id="runs-body" class="empty">No runs yet.</div>
</section>

<section id="goals-section">
  <h2>
    Goals
    <span class="meta" title="Phase 22.4 — daemon ticks every 60s; each tick spawns claude with the goal's roadmap.md">(per-project)</span>
  </h2>
  <div id="goals-body" class="empty">No active goals.</div>
</section>

<section id="missions-section">
  <h2>
    Missions
    <span class="meta" title="Phase 22.5 — multi-agent orchestrated tasks. Wake-condition auto-firing lands in 22.7">(per-project)</span>
  </h2>
  <div id="missions-body" class="empty">No active missions.</div>
</section>

<script>
(function () {
  const api = window.copad;
  if (!api) {
    document.body.innerHTML =
      '<p style="color:#f38ba8">copad bridge not available — open this panel from inside copad.</p>';
    return;
  }

  let activeProject = null;
  let projects = [];
  let workflows = [];
  let expandedWorkflowId = null;
  let lastPaneRemote = null;
  let lastActiveCwd = null;

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function relTime(ms) {
    if (!ms) return "—";
    const dt = (Date.now() - ms) / 1000;
    if (dt < 60) return `${Math.floor(dt)}s ago`;
    if (dt < 3600) return `${Math.floor(dt / 60)}m ago`;
    if (dt < 86400) return `${Math.floor(dt / 3600)}h ago`;
    return `${Math.floor(dt / 86400)}d ago`;
  }

  async function call(method, params) {
    try {
      return await api.call(method, params || {});
    } catch (e) {
      console.warn("copad.call failed", method, e);
      throw e;
    }
  }

  async function loadProjects() {
    const res = await call("project.list");
    projects = (res && res.projects) || [];
  }
  async function loadWorkflows() {
    const res = await call("workflow.list");
    workflows = (res && res.workflows) || [];
    workflows.sort((a, b) => a.id.localeCompare(b.id));
  }
  async function resolveActive() {
    try {
      const res = await call("project.resolve", { active: true });
      activeProject = (res && res.project) || null;
    } catch {
      activeProject = null;
    }
  }

  function renderProject() {
    const el = document.getElementById("project-body");
    if (!activeProject) {
      el.className = "empty";
      el.textContent = "No project for the focused pane.";
      return;
    }
    el.className = "";
    el.innerHTML = "";
    const p = activeProject;
    const rows = [
      ["name", `<span class="value">${escapeHtml(p.name)}</span>`],
      ["path", `<span class="value">${escapeHtml(p.path)}</span>`],
    ];
    if (p.git_remote) {
      const remoteUrl = `https://github.com/${escapeHtml(p.git_remote)}`;
      rows.push([
        "remote",
        `<span class="value"><span class="chip clickable" data-href="${remoteUrl}">${escapeHtml(p.git_remote)}</span></span>`,
      ]);
    }
    // Last-commit row populated lazily — see fetchLastCommit() below.
    rows.push(["last commit", `<span class="value" id="last-commit-cell" data-loading="1">…</span>`]);
    if (p.aliases && p.aliases.length) {
      rows.push([
        "aliases",
        `<span class="value">${p.aliases.map((a) => `<span class="chip">${escapeHtml(a)}</span>`).join("")}</span>`,
      ]);
    }
    if (p.subpath) {
      rows.push(["subpath", `<span class="value">${escapeHtml(p.subpath)}</span>`]);
    }
    if (p.description) {
      rows.push(["about", `<span class="value">${escapeHtml(p.description)}</span>`]);
    }
    el.innerHTML = rows
      .map((r) => `<div class="row"><span class="label">${r[0]}</span>${r[1]}</div>`)
      .join("");
    el.querySelectorAll(".chip.clickable[data-href]").forEach((chip) => {
      chip.addEventListener("click", () => {
        const url = chip.getAttribute("data-href");
        call("webview.open", { url, mode: "tab" }).catch(() => {});
      });
    });
    fetchLastCommit(p.name).catch(() => {});
  }

  async function fetchLastCommit(name) {
    let cell;
    try {
      const res = await call("project.last_commit", { name });
      cell = document.getElementById("last-commit-cell");
      if (!cell) return;
      const lc = res && res.last_commit;
      if (!lc) {
        cell.textContent = "—";
      } else {
        cell.innerHTML =
          `<code>${escapeHtml(lc.short_hash)}</code> ${escapeHtml(lc.subject)} ` +
          `<span class="meta">${escapeHtml(lc.when_relative)}</span>`;
      }
      cell.removeAttribute("data-loading");
    } catch {
      cell = document.getElementById("last-commit-cell");
      if (cell) {
        cell.textContent = "—";
        cell.removeAttribute("data-loading");
      }
    }
  }

  async function expandWorkflow(id) {
    expandedWorkflowId = id;
    let spec;
    try {
      spec = await call("workflow.get", { id });
    } catch (e) {
      return;
    }
    const card = document.querySelector(`[data-wf-id="${id}"]`);
    if (!card) return;
    const formEl = card.querySelector(".form");
    if (!formEl) return;
    formEl.innerHTML = "";
    (spec.form_fields || []).forEach((f) => {
      const field = document.createElement("div");
      field.className = "field";
      const lbl = document.createElement("label");
      lbl.textContent = f.label + (f.required ? " *" : "");
      field.appendChild(lbl);
      let input;
      if (f.type === "textarea") {
        input = document.createElement("textarea");
      } else if (f.type === "select") {
        input = document.createElement("select");
        (f.options || []).forEach((opt) => {
          const o = document.createElement("option");
          o.value = opt;
          o.textContent = opt;
          input.appendChild(o);
        });
      } else {
        input = document.createElement("input");
        input.type = "text";
      }
      input.name = f.name;
      if (f.placeholder) input.placeholder = f.placeholder;
      if (f.default) input.value = f.default;
      if (f.max_length) input.maxLength = f.max_length;
      if (f.pattern && input.tagName === "INPUT") input.pattern = f.pattern;
      field.appendChild(input);
      formEl.appendChild(field);
    });
    const submit = document.createElement("button");
    submit.textContent = "Run";
    submit.type = "button";
    submit.addEventListener("click", () => runWorkflow(spec, formEl, submit));
    formEl.appendChild(submit);
    const err = document.createElement("div");
    err.className = "err";
    formEl.appendChild(err);
    formEl.style.display = "block";
  }

  async function runWorkflow(spec, formEl, btn) {
    const err = formEl.querySelector(".err");
    err.textContent = "";
    const inputs = formEl.querySelectorAll("input,textarea,select");
    const values = {};
    inputs.forEach((i) => { values[i.name] = i.value; });
    const params = { id: spec.id, values };
    if (spec.require_project && activeProject) {
      params.project = activeProject.name;
    }
    btn.disabled = true;
    btn.textContent = "Running…";
    try {
      const res = await call("workflow.run", params);
      btn.textContent = `Started (tab #${(res && res.tab) != null ? res.tab : "?"})`;
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "Run";
        formEl.style.display = "none";
        expandedWorkflowId = null;
        loadRuns();
      }, 1500);
    } catch (e) {
      err.textContent = String((e && e.message) || e);
      btn.disabled = false;
      btn.textContent = "Run";
    }
  }

  function renderWorkflows() {
    const el = document.getElementById("workflows-body");
    if (!workflows.length) {
      el.className = "empty";
      el.textContent = "No workflows configured. Drop YAMLs into ~/.config/copad/workflows/.";
      return;
    }
    el.className = "";
    el.innerHTML = workflows.map((w) => `
      <div class="card" data-wf-id="${escapeHtml(w.id)}">
        <div class="card-title" data-toggle>
          <span>${escapeHtml(w.name)}${w.require_project ? '' : ' <span class="chip">global</span>'}</span>
          <span class="meta">${w.has_form_fields ? "form" : "no input"}</span>
        </div>
        <div class="card-desc">${escapeHtml(w.description || "")}</div>
        <div class="form" style="display:none"></div>
      </div>
    `).join("");
    el.querySelectorAll("[data-toggle]").forEach((header) => {
      header.addEventListener("click", () => {
        const card = header.closest(".card");
        const id = card.getAttribute("data-wf-id");
        if (expandedWorkflowId === id) {
          card.querySelector(".form").style.display = "none";
          expandedWorkflowId = null;
        } else {
          document.querySelectorAll(".form").forEach((f) => (f.style.display = "none"));
          expandWorkflow(id);
        }
      });
    });
  }

  async function loadRuns() {
    const el = document.getElementById("runs-body");
    try {
      const res = await call("event.history", { kind: "workflow.*" });
      const events = (res && res.events) || [];
      const starts = events.filter((e) => e.type === "workflow.started").reverse();
      if (!starts.length) {
        el.className = "empty";
        el.textContent = "No runs yet. (in-memory log; cleared on copad restart)";
        return;
      }
      el.className = "";
      el.innerHTML = starts.slice(0, 10).map((e) => {
        const d = e.data || {};
        return `<div class="row">
          <span class="label">${escapeHtml(d.workflow_id || "?")}</span>
          <span class="value">
            ${d.project ? `<span class="chip">${escapeHtml(d.project)}</span>` : '<span class="chip">global</span>'}
            <span class="meta">tab #${d.tab != null ? d.tab : "?"} · ${relTime(d.started_at_ms)}</span>
          </span>
        </div>`;
      }).join("");
    } catch (e) {
      el.className = "empty";
      el.textContent = "Could not load recent runs.";
    }
  }

  async function refresh() {
    await Promise.all([loadProjects(), loadWorkflows()]);
    await resolveActive();
    renderProject();
    renderWorkflows();
    await loadRuns();
    await loadGoals();
    await loadMissions();
  }

  // Phase 22.5 — Missions slot. Filtered by active project's git_remote.
  // Agent chips + state badge + pause/resume/abort buttons.
  async function loadMissions() {
    const el = document.getElementById("missions-body");
    if (!el) return;
    const remote = (activeProject && activeProject.git_remote) || lastPaneRemote;
    try {
      const params = {};
      if (remote) params.project = remote;
      const resp = await api.call("mission.list", params);
      const missions = (resp && resp.missions) || [];
      const active = missions.filter((m) => m.state !== "done" && m.state !== "aborted");
      if (active.length === 0) {
        el.className = "empty";
        el.textContent = remote ? `No active missions for ${remote}.` : "No active missions.";
        return;
      }
      el.className = "";
      el.innerHTML = "";
      for (const m of active) {
        const card = document.createElement("div");
        card.className = "card";
        const head = document.createElement("div");
        head.style.display = "flex";
        head.style.justifyContent = "space-between";
        head.style.alignItems = "baseline";
        const title = document.createElement("div");
        title.style.fontWeight = "600";
        title.textContent = m.title;
        const state = document.createElement("span");
        state.className = "chip";
        state.textContent = m.state;
        head.appendChild(title);
        head.appendChild(state);
        card.appendChild(head);
        if (m.objective) {
          const ob = document.createElement("div");
          ob.style.color = "var(--fg-mute, #6c7086)";
          ob.style.fontSize = "11px";
          ob.style.marginTop = "4px";
          ob.textContent = m.objective;
          card.appendChild(ob);
        }
        if (m.assigned_agents && m.assigned_agents.length > 0) {
          const ag = document.createElement("div");
          ag.style.marginTop = "4px";
          for (const a of m.assigned_agents) {
            const c = document.createElement("span");
            c.className = "chip";
            c.textContent = a.agent_id + (a.role ? " (" + a.role + ")" : "");
            ag.appendChild(c);
          }
          card.appendChild(ag);
        }
        const ctrls = document.createElement("div");
        ctrls.style.marginTop = "8px";
        ctrls.style.display = "flex";
        ctrls.style.gap = "6px";
        const mkBtn = (label, method) => {
          const b = document.createElement("button");
          b.textContent = label;
          b.addEventListener("click", async () => {
            try {
              await api.call(method, { id: m.id });
              await loadMissions();
            } catch (e) {
              b.textContent = "Error";
            }
          });
          return b;
        };
        if (m.state === "active" || m.state === "pending") {
          ctrls.appendChild(mkBtn("Pause", "mission.pause"));
        }
        if (m.state === "paused") {
          ctrls.appendChild(mkBtn("Resume", "mission.resume"));
        }
        ctrls.appendChild(mkBtn("Abort", "mission.abort"));
        card.appendChild(ctrls);
        el.appendChild(card);
      }
    } catch (e) {
      el.className = "empty";
      el.textContent = "Could not load missions.";
    }
  }

  // Phase 22.4 — Goals slot. Filtered by active project's git_remote.
  // Status badges + pause/resume/cancel/answer buttons. Daemon ticks
  // every 60s; tick result loop is async (goal.tick.apply called when
  // claude returns), so panel just rerenders on event signals.
  async function loadGoals() {
    const el = document.getElementById("goals-body");
    if (!el) return;
    const remote = (activeProject && activeProject.git_remote) || lastPaneRemote;
    try {
      const params = {};
      if (remote) params.project = remote;
      const resp = await api.call("goal.list", params);
      const goals = (resp && resp.goals) || [];
      const active = goals.filter((g) => g.status !== "done" && g.status !== "cancelled");
      if (active.length === 0) {
        el.className = "empty";
        el.textContent = remote ? `No active goals for ${remote}.` : "No active goals.";
        return;
      }
      el.className = "";
      el.innerHTML = "";
      for (const g of active) {
        const card = document.createElement("div");
        card.className = "card";
        const head = document.createElement("div");
        head.style.display = "flex";
        head.style.justifyContent = "space-between";
        head.style.alignItems = "baseline";
        const title = document.createElement("div");
        title.style.fontWeight = "600";
        title.textContent = g.title;
        const status = document.createElement("span");
        status.className = "chip";
        status.textContent = g.status;
        head.appendChild(title);
        head.appendChild(status);
        card.appendChild(head);
        if (g.last_tick_result) {
          const lt = document.createElement("div");
          lt.style.color = "var(--fg-mute, #6c7086)";
          lt.style.fontSize = "11px";
          lt.style.marginTop = "4px";
          lt.textContent = "last tick: " + String(g.last_tick_result).slice(0, 200);
          card.appendChild(lt);
        }
        if (g.status === "blocked" && g.blocked_question) {
          const q = document.createElement("div");
          q.style.marginTop = "6px";
          q.style.color = "var(--yellow, #f9e2af)";
          q.textContent = g.blocked_question;
          card.appendChild(q);
          const inp = document.createElement("input");
          inp.type = "text";
          inp.placeholder = "Answer…";
          inp.style.width = "100%";
          inp.style.marginTop = "4px";
          const ans = document.createElement("button");
          ans.textContent = "Send answer";
          ans.style.marginTop = "4px";
          ans.addEventListener("click", async () => {
            const text = inp.value.trim();
            if (!text) return;
            try {
              await api.call("goal.answer", { id: g.id, answer: text });
              await loadGoals();
            } catch (e) {
              ans.textContent = "Error";
            }
          });
          card.appendChild(inp);
          card.appendChild(ans);
        }
        const ctrls = document.createElement("div");
        ctrls.style.marginTop = "8px";
        ctrls.style.display = "flex";
        ctrls.style.gap = "6px";
        const mkBtn = (label, method) => {
          const b = document.createElement("button");
          b.textContent = label;
          b.addEventListener("click", async () => {
            try {
              await api.call(method, { id: g.id });
              await loadGoals();
            } catch (e) {
              b.textContent = "Error";
            }
          });
          return b;
        };
        if (g.status === "running") ctrls.appendChild(mkBtn("Pause", "goal.pause"));
        if (g.status === "paused") ctrls.appendChild(mkBtn("Resume", "goal.resume"));
        ctrls.appendChild(mkBtn("Cancel", "goal.cancel"));
        card.appendChild(ctrls);
        el.appendChild(card);
      }
    } catch (e) {
      el.className = "empty";
      el.textContent = "Could not load goals.";
    }
  }

  // copad-linux/src/plugin_panel.rs::_handleEvent invokes the handler
  // with the bus event's `data` payload directly — NOT a wrapper. So
  // `payload` is the flat PaneContext shape (panel_id / git_remote /
  // cwd / branch / …), not `{data:{…}}`. Reading `payload.data` would
  // be undefined; flagged by codex-review C2 on round 2.
  api.on("pane.context_changed", async (payload) => {
    const data = payload || {};
    const remote = data.git_remote || null;
    const cwd = data.cwd || null;
    if (remote === lastPaneRemote && cwd === lastActiveCwd) return;
    lastPaneRemote = remote;
    lastActiveCwd = cwd;
    await resolveActive();
    renderProject();
  });

  // Periodic refresh of recent runs (covers events fired between
  // pane.context_changed beats — e.g. workflow.timed_out)
  setInterval(loadRuns, 5000);
  // Goals tick every 60s daemon-side; UI refresh at 10s gives the user
  // near-immediate feedback for tick.completed / blocked transitions.
  setInterval(loadGoals, 10000);
  // Missions: same 10s cadence — wake-condition auto-firing isn't shipped,
  // but the UI still needs to reflect manual state changes (pause/resume).
  setInterval(loadMissions, 10000);

  refresh().catch((e) => console.warn("initial load failed", e));
})();
</script>

</body>
</html>
