<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>nestty</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e2e;
      --bg-2: #181825;
      --fg: #cdd6f4;
      --fg-dim: #a6adc8;
      --accent: #89b4fa;
      --accent-warn: #fab387;
      --accent-err: #f38ba8;
      --accent-ok: #a6e3a1;
      --border: #313244;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: ui-monospace, "JetBrains Mono", "SF Mono", monospace; }
    body { background: var(--bg); color: var(--fg); padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); display: flex; flex-direction: column; min-height: 100vh; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg-2); position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1rem; font-weight: 500; }
    header h1 .dim { color: var(--fg-dim); }
    .presence { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); cursor: pointer; background: var(--bg); color: var(--fg); font-size: 0.85rem; }
    .presence[data-state="away"] { color: var(--accent-warn); border-color: var(--accent-warn); }
    .presence[data-state="active"] { color: var(--accent-ok); border-color: var(--accent-ok); }
    .presence::before { content: "●"; }
    main { display: flex; flex-direction: column; gap: 1rem; padding: 1rem; flex: 1; max-width: 800px; width: 100%; margin: 0 auto; }
    section { background: var(--bg-2); border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden; }
    section header { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg-2); font-size: 0.8rem; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.05em; position: static; }
    .pane-list { display: flex; flex-direction: column; }
    .pane-row { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    .pane-row:last-child { border-bottom: none; }
    .pane-row:hover, .pane-row.focused { background: rgba(137, 180, 250, 0.08); }
    .pane-row .title { color: var(--fg); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pane-row .meta { color: var(--fg-dim); font-size: 0.75rem; }
    .recent { padding: 0.75rem 1rem; font-size: 0.85rem; max-height: 30vh; overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .events { display: flex; flex-direction: column; max-height: 35vh; overflow: auto; }
    .event { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .event:last-child { border-bottom: none; }
    .event .kind { color: var(--accent); margin-right: 0.5rem; }
    .event .ts { color: var(--fg-dim); font-size: 0.7rem; margin-left: 0.5rem; }
    .event[data-kind^="claude.commit_blocked"] .kind { color: var(--accent-err); }
    .event[data-kind^="claude.review_approved"] .kind { color: var(--accent-ok); }
    .input-row { padding: 0.75rem 1rem; display: flex; gap: 0.5rem; align-items: flex-end; border-top: 1px solid var(--border); background: var(--bg-2); position: sticky; bottom: 0; }
    .input-row textarea { flex: 1; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; resize: none; font-size: 0.9rem; min-height: 2.5rem; max-height: 12rem; }
    .input-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; }
    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    .banner { background: var(--accent-warn); color: var(--bg); padding: 0.5rem 1rem; font-size: 0.85rem; text-align: center; }
    .banner.error { background: var(--accent-err); }
    .empty { padding: 1rem; color: var(--fg-dim); text-align: center; font-size: 0.85rem; }
    .setup { padding: 1.5rem; }
    .setup input { display: block; width: 100%; padding: 0.5rem 0.75rem; margin: 0.5rem 0; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; }
    .setup button { padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  (() => {
    const root = document.getElementById("root");
    let token = sessionStorage.getItem("nestty.token") || "";

    function api(path, opts = {}) {
      opts.headers = Object.assign({}, opts.headers || {}, {
        "Authorization": "Bearer " + token,
        "Content-Type": opts.body ? "application/json" : undefined,
      });
      return fetch(path, opts).then(async (r) => {
        if (r.status === 401) {
          token = "";
          sessionStorage.removeItem("nestty.token");
          render();
          throw new Error("unauthorized");
        }
        const body = r.headers.get("content-type")?.includes("json")
          ? await r.json()
          : await r.text();
        if (!r.ok) {
          const err = body && body.error
            ? body.error
            : { code: String(r.status), message: typeof body === "string" ? body : "" };
          throw err;
        }
        return body;
      });
    }

    const state = {
      presence: null,
      panes: [],
      focusedPaneId: null,
      recent: [],
      events: [],
      noGui: false,
      input: "",
      ws: null,
    };

    function renderSetup() {
      root.innerHTML = `
        <header><h1>nestty <span class="dim">— remote bridge</span></h1></header>
        <main>
          <section>
            <header>Setup</header>
            <div class="setup">
              <p style="font-size:0.85rem; color:var(--fg-dim); margin-bottom:0.5rem;">
                Paste the bearer token from <code>$NESTTY_WEB_BRIDGE_TOKEN</code>.
                Stored in sessionStorage — cleared when you close the tab.
              </p>
              <input id="tok" type="password" placeholder="bearer token (≥32 chars)" autocomplete="off">
              <button id="connect">connect</button>
            </div>
          </section>
        </main>
      `;
      const inp = document.getElementById("tok");
      const btn = document.getElementById("connect");
      inp.focus();
      const submit = () => {
        const t = inp.value.trim();
        if (t.length < 32) { inp.style.borderColor = "var(--accent-err)"; return; }
        token = t;
        sessionStorage.setItem("nestty.token", t);
        bootstrap();
      };
      btn.addEventListener("click", submit);
      inp.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    }

    function render() {
      if (!token) { renderSetup(); return; }
      root.innerHTML = `
        <header>
          <h1>nestty <span class="dim">— remote bridge</span></h1>
          <button class="presence" id="presence-toggle" data-state="${state.presence || "?"}">${state.presence || "..."}</button>
        </header>
        ${state.noGui ? `<div class="banner">nestty GUI is not running — only presence + events work</div>` : ""}
        <main>
          <section>
            <header>panes</header>
            <div class="pane-list" id="panes">
              ${state.panes.length === 0
                ? `<div class="empty">no panes</div>`
                : state.panes.map((p) => `
                    <div class="pane-row${p.id === state.focusedPaneId ? " focused" : ""}" data-id="${p.id}">
                      <div class="title">${escapeHtml(p.title || p.id)}</div>
                      <div class="meta">${escapeHtml(p.type || "?")}${p.focused ? " · focused" : ""}</div>
                    </div>`).join("")}
            </div>
            <div class="recent" id="recent">${state.recent.length === 0 ? "(select a pane to load recent output)" : state.recent.map(escapeHtml).join("\n")}</div>
            <div class="input-row">
              <textarea id="input" placeholder="${state.focusedPaneId ? "type a command — Enter to send, Shift+Enter for newline" : "select a pane first"}" rows="1" ${state.focusedPaneId ? "" : "disabled"}></textarea>
              <button id="send" ${state.focusedPaneId ? "" : "disabled"}>send</button>
            </div>
          </section>
          <section>
            <header>recent events</header>
            <div class="events" id="events">
              ${state.events.length === 0
                ? `<div class="empty">waiting for events…</div>`
                : state.events.slice().reverse().map((e) => `
                    <div class="event" data-kind="${escapeAttr(e.type || e.kind || "?")}">
                      <span class="kind">${escapeHtml(e.type || e.kind || "?")}</span>
                      ${escapeHtml(summarize(e))}
                      <span class="ts">${fmtTs(e.timestamp_ms)}</span>
                    </div>`).join("")}
            </div>
          </section>
        </main>
      `;
      document.getElementById("presence-toggle").addEventListener("click", togglePresence);
      document.querySelectorAll(".pane-row").forEach((el) => {
        el.addEventListener("click", () => selectPane(el.dataset.id));
      });
      const ta = document.getElementById("input");
      const send = document.getElementById("send");
      if (ta && !ta.disabled) {
        ta.value = state.input;
        ta.addEventListener("input", (e) => { state.input = e.target.value; });
        ta.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
        });
      }
      if (send && !send.disabled) send.addEventListener("click", doSend);
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }
    function fmtTs(ms) {
      if (!ms) return "";
      const d = new Date(ms);
      return d.toTimeString().slice(0, 8);
    }
    function summarize(e) {
      const p = e.data || e.payload || {};
      if (typeof p === "string") return p;
      const keys = Object.keys(p);
      if (keys.length === 0) return "";
      const pick = keys.slice(0, 2).map((k) => `${k}=${JSON.stringify(p[k]).slice(0, 60)}`).join(" ");
      return pick;
    }

    async function bootstrap() {
      try {
        const presence = await api("/api/presence");
        state.presence = presence.state;
        state.noGui = false;
      } catch (e) {
        if (e && e.code === "unauthorized") return;
        state.presence = "?";
      }
      try {
        const panes = await api("/api/panes");
        state.panes = Array.isArray(panes) ? panes : (panes?.panels || []);
        if (state.panes.length > 0 && !state.focusedPaneId) {
          state.focusedPaneId = state.panes.find((p) => p.focused)?.id || state.panes[0].id;
          loadRecent();
        }
      } catch (e) {
        if (e && e.code === "no_gui") state.noGui = true;
        state.panes = [];
      }
      render();
      openEventStream();
    }

    function openEventStream() {
      if (state.ws) try { state.ws.close(); } catch {}
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const url = `${proto}://${location.host}/ws/events`;
      const ws = new WebSocket(url, [`bearer.${token}`]);
      state.ws = ws;
      ws.onmessage = (msg) => {
        try {
          const event = JSON.parse(msg.data);
          state.events.push(event);
          if (state.events.length > 50) state.events.shift();
          // If presence changed, reflect it.
          if ((event.type || event.kind) === "presence.changed") {
            const cur = event.data?.current || event.payload?.current;
            if (cur) state.presence = cur;
          }
          render();
        } catch {}
      };
      ws.onclose = () => { state.ws = null; setTimeout(openEventStream, 2000); };
      ws.onerror = () => { try { ws.close(); } catch {} };
    }

    async function togglePresence() {
      const next = state.presence === "away" ? "active" : "away";
      try {
        const r = await api("/api/presence", { method: "POST", body: JSON.stringify({ state: next }) });
        state.presence = r.current || next;
        render();
      } catch (e) {
        alert(`presence flip failed: ${e.code || ""} ${e.message || ""}`);
      }
    }

    async function selectPane(id) {
      state.focusedPaneId = id;
      await loadRecent();
      render();
    }

    async function loadRecent() {
      if (!state.focusedPaneId) return;
      try {
        const r = await api(`/api/panes/${encodeURIComponent(state.focusedPaneId)}/recent?lines=20`);
        state.recent = (r.lines || []).slice();
        state.noGui = false;
      } catch (e) {
        if (e && e.code === "no_gui") {
          // GUI vanished mid-session — clear pane focus so the
          // input/textarea disable-check (`!state.focusedPaneId`)
          // takes effect, and let render() show the no_gui banner.
          state.noGui = true;
          state.recent = [];
          state.focusedPaneId = null;
        } else {
          state.recent = [`(error: ${e.code || ""} ${e.message || ""})`];
        }
      }
      render();
    }

    async function doSend() {
      const text = state.input;
      if (!text || !state.focusedPaneId) return;
      try {
        await api(`/api/panes/${encodeURIComponent(state.focusedPaneId)}/input`, {
          method: "POST",
          body: JSON.stringify({ text: text + "\n" }),
        });
        state.input = "";
        render();
        // Short delay then refresh recent output (loadRecent owns its
        // own render() call so the post-send view updates without a
        // separate trigger).
        setTimeout(loadRecent, 200);
      } catch (e) {
        alert(`send failed: ${e.code || ""} ${e.message || ""}`);
      }
    }

    if (token) bootstrap(); else render();
  })();
  </script>
</body>
</html>
